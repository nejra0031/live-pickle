      { id: "yellow", name: "Yellow", color: "#eab308", text: "#000" },
      { id: "green",  name: "Green",  color: "#22c55e", text: "#fff" },
      { id: "orange", name: "Orange", color: "#f97316", text: "#fff" },
      { id: "purple", name: "Purple", color: "#a855f7", text: "#fff" },

      { id: "brown",  name: "Brown",  color: "#92400e", text: "#fff" },
      { id: "teal",   name: "Teal",   color: "#14b8a6", text: "#fff" },

      { id: "rose",   name: "Rose",   color: "#f43f5e", text: "#fff" },
      { id: "amber",  name: "Amber",  color: "#f59e0b", text: "#000" },
      { id: "navy",   name: "Navy",   color: "#1e40af", text: "#fff" },
      { id: "mint",   name: "Mint",   color: "#6ee7b7", text: "#000" },
      { id: "coral",  name: "Coral",  color: "#fb7185", text: "#fff" },

    ];
    // Runtime team registry — includes both color teams and named custom teams
    // Custom teams are added at setup time and stored in Firebase alongside tournament data
    let TEAM_REGISTRY = [...ALL_TEAMS];
    const teamById = (id) => TEAM_REGISTRY.find((t) => t.id === id);
    const registerTeams = (teams) => { TEAM_REGISTRY = teams; };

    // ─── Firebase array normalisation ──────────────────────────────────────────
    // Firebase converts JS arrays to objects with "0","1",... keys on round-trips.
    // This helper converts them back to arrays safely.
    function toArr(val) {
      if (!val) return [];
      if (Array.isArray(val)) return val;
      // Firebase object with numeric-ish keys → sort and extract values
      return Object.keys(val).sort((a,b) => Number(a)-Number(b)).map(k => val[k]);
    }
    function normaliseSnapshot(s) {
      if (!s) return s;
      const h = toArr(s.history).map(round => ({
        ...round,
        games: toArr(round.games),
        bye: toArr(round.bye),
        paused: toArr(round.paused),
      }));
      const rd = s.roundData ? {
        courtTeamIds: toArr(s.roundData.courtTeamIds).map(pair => toArr(pair)),
        byeIds: toArr(s.roundData.byeIds),
        pausedTeamIds: toArr(s.roundData.pausedTeamIds),
      } : null;
      return {
        ...s,
        history: h,
        roundData: rd,
        activeTeamIds: toArr(s.activeTeamIds),
        courtNumbers: toArr(s.courtNumbers),
        pausedIds: toArr(s.pausedIds),
        teamRegistry: s.teamRegistry ? toArr(s.teamRegistry) : null,
      };
    }

    // ─── Persistence (localStorage) ──────────────────────────────────────────────
    const SAVE_KEY = "pickleball_tournament_v1";

    function saveState(state) {
      try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch (e) {}
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(SAVE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (e) { return null; }
    }

    function clearSave() {
      try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
    }

    // ─── Alarm (Web Audio API) ────────────────────────────────────────────────────
    let _audioCtx = null;
    function getAudioCtx() {
      if (!_audioCtx || _audioCtx.state === "closed")
        _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return _audioCtx;
    }
    function playAlarm() {
      try {
        const ctx = getAudioCtx();
        const fire = () => {
          const beepCount = 8, beepDuration = 0.22, beepGap = 0.1;
          for (let i = 0; i < beepCount; i++) {
            const osc = ctx.createOscillator(), gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = "square";
            osc.frequency.value = i % 2 === 0 ? 960 : 1280;
            const t = ctx.currentTime + i * (beepDuration + beepGap);
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.7, t + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, t + beepDuration);
            osc.start(t); osc.stop(t + beepDuration + 0.02);
          }
        };
        ctx.state === "suspended" ? ctx.resume().then(fire) : fire();
      } catch (e) { console.warn("Audio error", e); }
    }
    function warmUpAudio() { try { getAudioCtx(); } catch (e) {} }

    // ─── Standings helpers ────────────────────────────────────────────────────────
    function mkStandings(teamIds) {
      return teamIds.map((id) => ({
        ...teamById(id), wins: 0, losses: 0, scoreDiff: 0, played: 0,
        lastPlayedRound: -999, lastByeRound: -999,
      }));
    }
    function rerank(standings) {
      return [...standings].sort((a, b) => {
        if (b.wins !== a.wins) return b.wins - a.wins;
        if (b.scoreDiff !== a.scoreDiff) return b.scoreDiff - a.scoreDiff;
        return a.played - b.played;
      });
    }
    function rebuildStandings(teamIds, history) {
      const map = Object.fromEntries(mkStandings(teamIds).map((t) => [t.id, { ...t }]));
      history.forEach((round, ri) => {
        round.games.forEach((game) => {
          const w = map[game.winnerId], l = map[game.loserId];
          if (!w || !l) return;
          w.wins++; w.scoreDiff += game.winnerScore - game.loserScore; w.played++; w.lastPlayedRound = ri;
          l.losses++; l.scoreDiff += game.loserScore - game.winnerScore; l.played++; l.lastPlayedRound = ri;
        });
        (round.bye || []).forEach((id) => { if (map[id]) map[id].lastByeRound = ri; });
      });
      return Object.values(map);
    }

    // ─── Scheduling ───────────────────────────────────────────────────────────────
    function combinations(arr, k) {
      if (k === 0) return [[]];
      if (arr.length < k) return [];
      const [first, ...rest] = arr;
      return [...combinations(rest, k - 1).map((c) => [first, ...c]), ...combinations(rest, k)];
    }
    function buildByeCounts(history) {
      const solo = {}, pairs = {};
      history.forEach((round) => {
        const ids = round.bye || [];
        ids.forEach((id) => { solo[id] = (solo[id] || 0) + 1; });
        for (let i = 0; i < ids.length; i++)
          for (let j = i + 1; j < ids.length; j++) {
            const key = [ids[i], ids[j]].sort().join("|");
            pairs[key] = (pairs[key] || 0) + 1;
          }
      });
      return { solo, pairs };
    }
    function scoreByeGroup(ids, { solo, pairs }) {
      let pairScore = 0, soloScore = 0;
      for (let i = 0; i < ids.length; i++) {
        soloScore += solo[ids[i]] || 0;
        for (let j = i + 1; j < ids.length; j++) {
          const key = [ids[i], ids[j]].sort().join("|");
          pairScore += pairs[key] || 0;
        }
      }
      return pairScore * 1000 + soloScore + Math.random() * 0.001;
    }
    function generateRound(allStandings, numCourts, roundIdx, history = [], pausedIds = []) {
      const pausedSet = new Set(pausedIds);
      const active = allStandings.filter((t) => !pausedSet.has(t.id));
      const numBye = active.length - numCourts * 2;
      if (numBye <= 0) {
        const usableCourts = Math.floor(active.length / 2);
        return { courts: chunkByRank(active, usableCourts, allStandings), bye: [], paused: allStandings.filter((t) => pausedSet.has(t.id)) };
      }
      const byeCounts = buildByeCounts(history);
      const lastRoundByeIds = history.length > 0 ? new Set(history[history.length - 1].bye || []) : new Set();
      const byMostPlayed = [...active].sort((a, b) => b.played - a.played);
      const byeGroup = [];
      let idx = 0;
      while (byeGroup.length < numBye && idx < byMostPlayed.length) {
        const currentPlayed = byMostPlayed[idx].played;
        const tier = [];
        while (idx < byMostPlayed.length && byMostPlayed[idx].played === currentPlayed) tier.push(byMostPlayed[idx++]);
        const slotsLeft = numBye - byeGroup.length;
        if (tier.length <= slotsLeft) {
          byeGroup.push(...tier);
        } else {
          const combos = combinations(tier, slotsLeft);
          let bestCombo = combos[0], bestScore = Infinity;
          for (const combo of combos) {
            const ids = combo.map((t) => t.id);
            let score = scoreByeGroup(ids, byeCounts);
            score += ids.filter((id) => lastRoundByeIds.has(id)).length * 1_000_000;
            if (score < bestScore) { bestScore = score; bestCombo = combo; }
          }
          byeGroup.push(...bestCombo);
        }
      }
      const byeIds = new Set(byeGroup.map((t) => t.id));
      const playing = active.filter((t) => !byeIds.has(t.id));
      return { courts: chunkByRank(playing, numCourts, allStandings), bye: byeGroup, paused: allStandings.filter((t) => pausedSet.has(t.id)) };
    }
    function chunkByRank(playing, numCourts, allStandings) {
      const ranked = rerank(allStandings);
      const rankOf = (id) => ranked.findIndex((t) => t.id === id);
      const byRank = [...playing].sort((a, b) => rankOf(a.id) - rankOf(b.id));
      const courts = [];
      for (let c = 0; c < numCourts; c++)
        if (byRank[c * 2] && byRank[c * 2 + 1]) courts.push([byRank[c * 2], byRank[c * 2 + 1]]);
      return courts;
    }

    // ─── Helpers ──────────────────────────────────────────────────────────────────
    const ORDINAL = (n) => { const s = ["th","st","nd","rd"], v = n % 100; return n + (s[(v-20)%10] || s[v] || s[0]); };

    function TeamChip({ teamId }) {
      const team = teamById(teamId);
      if (!team) return null;
      return (
        <span className="inline-flex items-center rounded-full px-2 py-1 text-xs font-semibold"
          style={{ background: team.color, color: team.text, border: "2px solid rgba(255,255,255,0.15)" }}>
          {team.name}
        </span>
      );
    }
    function NumInput({ value, onChange }) {
      return (
        <input type="number" min={0} max={99} value={value}
          onChange={(e) => onChange(e.target.value === "" ? "" : Number(e.target.value))}
          style={{ width: 54, textAlign: "center", padding: "5px 0", background: "rgba(255,255,255,0.08)",
            border: "1px solid rgba(255,255,255,0.2)", borderRadius: 8, color: "#e2e8f0", fontWeight: 700, fontSize: 14, outline: "none" }} />
      );
    }

    // ─── PIN Modal (generic) ──────────────────────────────────────────────────────
    function PinModal({ title = "Admin PIN", onSuccess, onClose }) {
      const [pin, setPin] = useState("");
      const [error, setError] = useState(false);
      const check = () => {
        if (pin === "1177") { onSuccess(); }
        else { setError(true); setPin(""); setTimeout(() => setError(false), 1200); }
      };
      return (
        <div className="fixed inset-0 flex items-center justify-center z-50 p-4"
          style={{ background: "rgba(0,0,0,0.85)" }} onClick={onClose}>
          <div className="rounded-2xl p-6 w-full max-w-xs flex flex-col gap-4"
            style={{ background: "#1e293b", border: `1px solid ${error ? "#ef4444" : "rgba(99,102,241,0.4)"}` }}
            onClick={(e) => e.stopPropagation()}>
            <div className="text-center">
              <div className="text-2xl mb-1">🔐</div>
              <div className="text-sm font-bold text-indigo-300">{title}</div>
              {error && <div className="text-xs text-red-400 mt-1">Incorrect PIN</div>}
            </div>
            <input type="password" inputMode="numeric" maxLength={4} value={pin} placeholder="••••"
              onChange={(e) => setPin(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && check()}
              autoFocus
              style={{ textAlign: "center", padding: "10px", borderRadius: 10, fontSize: 20, letterSpacing: 6,
                background: "rgba(255,255,255,0.07)", border: `1px solid ${error ? "#ef4444" : "rgba(255,255,255,0.15)"}`,
                color: "#e2e8f0", outline: "none" }} />
            <div className="flex gap-2">
              <button onClick={onClose} className="flex-1 py-2 rounded-xl text-sm font-bold"
                style={{ background: "rgba(255,255,255,0.06)", color: "#94a3b8", cursor: "pointer" }}>Cancel</button>
              <button onClick={check} className="flex-1 py-2 rounded-xl text-sm font-bold"
                style={{ background: "linear-gradient(90deg,#6366f1,#8b5cf6)", color: "#fff", cursor: "pointer" }}>Unlock</button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Timer Settings Modal ─────────────────────────────────────────────────────
    function TimerSettingsModal({ currentMins, onSave, onClose }) {
      const [mins, setMins] = useState(currentMins);
      return (
        <div className="fixed inset-0 flex items-center justify-center z-50 p-4"
          style={{ background: "rgba(0,0,0,0.75)" }} onClick={onClose}>
          <div className="rounded-2xl p-6 w-full max-w-xs flex flex-col gap-4"
            style={{ background: "#1e293b", border: "1px solid rgba(99,102,241,0.4)" }}
            onClick={(e) => e.stopPropagation()}>
            <div className="text-sm font-bold text-indigo-300 uppercase tracking-widest">⚙️ Timer Settings</div>
            <div className="flex items-center gap-3">
              <input type="number" min={1} max={99} value={mins}
                onChange={(e) => setMins(Math.max(1, Number(e.target.value)))}
                style={{ width: 70, textAlign: "center", padding: "8px", borderRadius: 8, fontSize: 18, fontWeight: 700,
                  background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.2)", color: "#e2e8f0", outline: "none" }} />
              <span className="text-slate-400 text-sm">minutes per round</span>
            </div>
            <p className="text-slate-500 text-xs">Applies after next ↺ reset.</p>
            <div className="flex gap-2">
              <button onClick={onClose} className="flex-1 py-2 rounded-xl text-sm font-bold"
                style={{ background: "rgba(255,255,255,0.06)", color: "#94a3b8", cursor: "pointer" }}>Cancel</button>
              <button onClick={() => { onSave(mins); onClose(); }} className="flex-1 py-2 rounded-xl text-sm font-bold"
                style={{ background: "linear-gradient(90deg,#6366f1,#8b5cf6)", color: "#fff", cursor: "pointer" }}>Save</button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Timer display ─────────────────────────────────────────────────────────────
    function RoundTimer({ secsLeft, totalSecs, roundNum, timerRunning, isAdmin, onToggle, onRestart, onOpenSettings }) {
      const mins = Math.floor(secsLeft / 60), secs = secsLeft % 60;
      const pct = totalSecs > 0 ? secsLeft / totalSecs : 1;
      const expired = secsLeft === 0, urgent = pct < 0.2 && !expired;
      const color = expired ? "#ef4444" : urgent ? "#f97316" : "#6366f1";
      return (
        <div className="flex items-center gap-2 rounded-xl px-3 py-2 mb-1"
          style={{ background: "rgba(255,255,255,0.04)", border: `1px solid ${color}44` }}>
          <svg width={34} height={34} style={{ flexShrink: 0 }}>
            <circle cx={17} cy={17} r={13} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth={3} />
            <circle cx={17} cy={17} r={13} fill="none" stroke={color} strokeWidth={3}
              strokeDasharray={`${2 * Math.PI * 13}`}
              strokeDashoffset={`${2 * Math.PI * 13 * (1 - pct)}`}
              strokeLinecap="round"
              style={{ transform: "rotate(-90deg)", transformOrigin: "17px 17px", transition: "stroke-dashoffset 1s linear, stroke 0.3s" }} />
            {expired && <text x={17} y={21} textAnchor="middle" fontSize={9} fill="#ef4444" fontWeight="bold">!</text>}
          </svg>
          <div className="flex-1">
            <div className="text-xs text-slate-500 leading-none mb-0.5">Round {roundNum}</div>
            <div className="font-mono font-bold text-sm leading-none"
              style={{ color: expired ? "#ef4444" : urgent ? "#f97316" : "#e2e8f0" }}>
              {expired ? "TIME'S UP" : `${mins}:${String(secs).padStart(2, "0")}`}
            </div>
          </div>
          {isAdmin && (
            <div className="flex gap-1">
              <button onClick={onToggle} className="text-xs px-2 py-1 rounded-lg font-bold"
                style={{ background: timerRunning ? "rgba(239,68,68,0.15)" : "rgba(99,102,241,0.2)",
                  color: timerRunning ? "#f87171" : "#a5b4fc", cursor: "pointer",
                  border: `1px solid ${timerRunning ? "rgba(239,68,68,0.3)" : "rgba(99,102,241,0.3)"}` }}>
                {timerRunning ? "⏸" : "▶"}
              </button>
              <button onClick={onRestart} className="text-xs px-2 py-1 rounded-lg font-bold"
                style={{ background: "rgba(255,255,255,0.05)", color: "#64748b", cursor: "pointer", border: "1px solid rgba(255,255,255,0.08)" }}>↺</button>
              <button onClick={onOpenSettings} className="text-xs px-2 py-1 rounded-lg font-bold"
                style={{ background: "rgba(255,255,255,0.05)", color: "#64748b", cursor: "pointer", border: "1px solid rgba(255,255,255,0.08)" }}>⚙</button>
            </div>
          )}
        </div>
      );
    }

    // ─── CourtCard ────────────────────────────────────────────────────────────────
    function CourtCard({ courtLabel, teams, onResult, done }) {
      const [s0, setS0] = useState(""), [s1, setS1] = useState("");
      const valid = s0 !== "" && s1 !== "" && Number(s0) !== Number(s1);
      const wIdx = valid ? (Number(s0) > Number(s1) ? 0 : 1) : null;
      const confirm = () => {
        if (!valid) return;
        const w = teams[wIdx], l = teams[1 - wIdx];
        onResult({ winnerId: w.id, loserId: l.id,
          winnerScore: wIdx === 0 ? Number(s0) : Number(s1),
          loserScore:  wIdx === 0 ? Number(s1) : Number(s0) });
      };
      if (done) return (
        <div className="rounded-2xl p-4 flex items-center gap-3"
          style={{ background: "rgba(34,197,94,0.07)", border: "1px solid rgba(34,197,94,0.25)" }}>
          <span className="text-green-400 text-lg">✓</span>
          <span className="text-sm text-slate-400">{courtLabel} result logged</span>
        </div>
      );
      return (
        <div className="rounded-2xl p-5 flex flex-col gap-3"
          style={{ background: "linear-gradient(135deg,#1e293b 0%,#0f172a 100%)",
            border: "1px solid rgba(99,102,241,0.3)", boxShadow: "0 4px 24px rgba(0,0,0,0.4)" }}>
          <div className="flex items-center gap-2">
            <span className="text-indigo-400 font-mono text-xs uppercase tracking-widest">{courtLabel}</span>
            <div className="flex-1 h-px" style={{ background: "rgba(99,102,241,0.2)" }} />
          </div>
          {teams.map((team, i) => {
            const isWinner = wIdx === i;
            return (
              <div key={team.id}>
                <div className="flex items-center gap-3">
                  <div className="flex-1 flex items-center gap-3 rounded-xl px-3 py-2"
                    style={{ background: isWinner ? `${team.color}28` : "rgba(255,255,255,0.04)",
                      border: `1.5px solid ${isWinner ? team.color : "rgba(255,255,255,0.08)"}` }}>
                    <div className="w-3 h-3 rounded-full flex-shrink-0" style={{ background: team.color }} />
                    <span className="font-bold text-sm flex-1">{team.name}</span>
                    {isWinner && <span className="text-xs text-green-400 font-bold">WIN</span>}
                  </div>
                  <NumInput value={i === 0 ? s0 : s1} onChange={i === 0 ? setS0 : setS1} />
                </div>
                {i === 0 && <div className="text-center text-slate-600 text-xs my-1 font-bold">VS</div>}
              </div>
            );
          })}
          {s0 !== "" && s1 !== "" && !valid &&
            <p className="text-xs text-amber-400 text-center">Scores cannot be equal — there must be a winner.</p>}
          <button onClick={confirm} disabled={!valid} className="w-full py-2 rounded-xl text-sm font-bold"
            style={{ background: valid ? "linear-gradient(90deg,#6366f1,#8b5cf6)" : "rgba(255,255,255,0.05)",
              color: valid ? "#fff" : "#475569", cursor: valid ? "pointer" : "not-allowed",
              border: valid ? "none" : "1px solid rgba(255,255,255,0.06)" }}>
            {valid ? `✓ Confirm — ${teams[wIdx].name} wins` : "Enter scores to confirm"}
          </button>
        </div>
      );
    }

    // ─── EditModal ────────────────────────────────────────────────────────────────
    function EditModal({ game, label, onSave, onClose }) {
      const t0 = teamById(game.winnerId), t1 = teamById(game.loserId);
      const [sa, setSa] = useState(game.winnerScore), [sb, setSb] = useState(game.loserScore);
      const valid = sa !== "" && sb !== "" && Number(sa) !== Number(sb);
      const newWId = valid ? (Number(sa) > Number(sb) ? t0.id : t1.id) : null;
      const save = () => {
        if (!valid) return;
        onSave({ winnerId: newWId, loserId: newWId === t0.id ? t1.id : t0.id,
          winnerScore: newWId === t0.id ? Number(sa) : Number(sb),
          loserScore:  newWId === t0.id ? Number(sb) : Number(sa) });
      };
      return (
        <div className="fixed inset-0 flex items-center justify-center z-50 p-4"
          style={{ background: "rgba(0,0,0,0.75)" }} onClick={onClose}>
          <div className="rounded-2xl p-6 w-full max-w-sm flex flex-col gap-4"
            style={{ background: "#1e293b", border: "1px solid rgba(99,102,241,0.4)" }}
            onClick={(e) => e.stopPropagation()}>
            <div className="text-sm font-bold text-indigo-300 uppercase tracking-widest">{label} — Edit Score</div>
            {[{ team: t0, val: sa, set: setSa }, { team: t1, val: sb, set: setSb }].map(({ team, val, set }, i) => (
              <div key={team.id}>
                <div className="flex items-center gap-3">
                  <div className="w-3 h-3 rounded-full" style={{ background: team.color }} />
                  <span className="flex-1 font-semibold text-sm">{team.name}</span>
                  <NumInput value={val} onChange={set} />
                </div>
                {i === 0 && <div className="text-center text-slate-600 text-xs my-2">VS</div>}
              </div>
            ))}
            {valid && newWId && <p className="text-xs text-green-400 text-center">
              → {teamById(newWId)?.name} wins {Math.max(Number(sa),Number(sb))}–{Math.min(Number(sa),Number(sb))}</p>}
            {!valid && sa !== "" && sb !== "" && <p className="text-xs text-amber-400 text-center">Scores can't be equal.</p>}
            <div className="flex gap-2">
              <button onClick={onClose} className="flex-1 py-2 rounded-xl text-sm font-bold"
                style={{ background: "rgba(255,255,255,0.06)", color: "#94a3b8", cursor: "pointer" }}>Cancel</button>
              <button onClick={save} disabled={!valid} className="flex-1 py-2 rounded-xl text-sm font-bold"
                style={{ background: valid ? "linear-gradient(90deg,#6366f1,#8b5cf6)" : "rgba(255,255,255,0.04)",
                  color: valid ? "#fff" : "#475569", cursor: valid ? "pointer" : "not-allowed" }}>Save</button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Setup Screen ──────────────────────────────────────────────────────────
    function SetupScreen({ onStart }) {
      const [selectedColors, setSelectedColors] = useState(["red","blue","yellow","green","orange","pink"]);
      const [namedTeamsInput, setNamedTeamsInput] = useState("");
      const [namedTeams, setNamedTeams] = useState([]);
      const [courts, setCourts] = useState(["1", "2"]);
      const [courtInput, setCourtInput] = useState("");
      const [timerMins, setTimerMins] = useState(12);
      const [timerEnabled, setTimerEnabled] = useState(true);

      const toggleColor = (id) => setSelectedColors(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);

      const parseNamedTeams = (input, usedColorIds) => {
        const usedColors = new Set(usedColorIds);
        const available = ALL_TEAMS.filter(t => !usedColors.has(t.id));
        const names = input.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
        return names.map((name, i) => {
          const c = available[i % available.length] || ALL_TEAMS[i % ALL_TEAMS.length];
          return { id: "custom_" + i + "_" + name.replace(/[^a-z0-9]/gi,"").toLowerCase(), name, color: c.color, text: c.text };
        });
      };

      const handleNamedInput = (val) => {
        setNamedTeamsInput(val);
        setNamedTeams(parseNamedTeams(val, selectedColors));
      };

      const allSelectedTeams = [
        ...selectedColors.map(id => ALL_TEAMS.find(t => t.id === id)).filter(Boolean),
        ...namedTeams,

      const allTeamIds = allSelectedTeams.map(t => t.id);

        if (!val || courts.includes(val)) { setCourtInput(""); return; }
        setCourts(p => [...p, val]);
        setCourtInput("");

        else setCourts(p => [...p, val].sort((a,b) => { const na=Number(a), nb=Number(b); return (na&&nb) ? na-nb : a.localeCompare(b); }));

      return (

            <p className="text-sm font-bold text-slate-300 mb-1">Named Teams</p>
            <p className="text-slate-500 text-xs mb-2">Names separated by commas or new lines — colors auto-assigned</p>

                    style={{ background: "rgba(99,102,241,0.35)", color: "#a5b4fc", border: "2px solid rgba(99,102,241,0.7)" }}>
                    {c}
                    <button onClick={() => setCourts(p => p.filter(x => x !== c))}

            <p className="text-slate-500 text-xs mb-2">Or enter any custom court name:</p>
            <div className="flex gap-2">

            <p className="text-slate-500 text-xs mt-2">{courts.length} court{courts.length !== 1 ? "s" : ""}: {courts.join(", ")}</p>
          </div>

          <div>
            <div className="flex items-center gap-3 mb-2">
              <p className="text-sm font-bold text-slate-300">Round Timer</p>
              <button onClick={() => setTimerEnabled(p => !p)} className="text-xs px-2 py-1 rounded-lg font-bold"
                style={{ background: timerEnabled ? "rgba(99,102,241,0.2)" : "rgba(255,255,255,0.05)",
                  color: timerEnabled ? "#a5b4fc" : "#475569", cursor: "pointer",
                  border: "1px solid " + (timerEnabled ? "rgba(99,102,241,0.4)" : "rgba(255,255,255,0.08)") }}>

            {timerEnabled && (
              <div className="flex items-center gap-3">
                <input type="number" min={1} max={99} value={timerMins}
                  onChange={e => setTimerMins(Math.max(1, Number(e.target.value)))}
                  style={{ ...iStyle, width: 64, textAlign: "center", fontSize: 14 }} />
                <span className="text-slate-400 text-sm">minutes per round</span>
              </div>
            )}
            {timerEnabled && <p className="text-slate-500 text-xs mt-2">A loud alarm sounds when time runs out.</p>}
          </div>

          <div className="rounded-xl p-3 text-xs leading-relaxed"
            style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)", color: "#94a3b8" }}>
            {courts.length} court{courts.length !== 1 ? "s" : ""} → {numPlaying} play,{" "}
            {Math.max(0, allTeamIds.length - numPlaying)} bye per round{timerEnabled ? " · " + timerMins + " min rounds" : ""}.<br/>
            No back-to-back byes. Bye partnerships rotate.
          </div>
          {!canStart && <p className="text-amber-400 text-xs text-center">Need at least 3 teams.</p>}
          <button onClick={() => canStart && onStart(allSelectedTeams, allTeamIds, courts, timerEnabled ? timerMins * 60 : 0)}
            disabled={!canStart} className="w-full py-3 rounded-xl font-bold text-base"
            style={{ background: canStart ? "linear-gradient(90deg,#6366f1,#8b5cf6)" : "rgba(255,255,255,0.05)",
              color: canStart ? "#fff" : "#475569", cursor: canStart ? "pointer" : "not-allowed" }}>
            Start Tournament &#x1F680;

    // ─── Pause Panel ──────────────────────────────────────────────────────────────
    function PausePanel({ activeTeamIds, pausedIds, onTogglePause }) {

    // ─── Restore Banner ───────────────────────────────────────────────────────────
    function RestoreBanner({ saved, onRestore, onDiscard }) {
      const d = new Date(saved.savedAt);

      const dateStr = d.toLocaleDateString([], { month: "short", day: "numeric" });
      return (

          style={{ background: "rgba(99,102,241,0.1)", border: "1px solid rgba(99,102,241,0.4)" }}>
        <div>
          <p className="text-sm font-bold text-indigo-300">&#x1F4BE; Saved tournament found</p>
          <p className="text-xs text-slate-400 mt-1">
            Round {saved.roundNum} · {saved.activeTeamIds?.length} teams · Courts {saved.courtNumbers?.join(", ")}
            <br/>Saved at {timeStr} on {dateStr}

          <button onClick={onDiscard} className="flex-1 py-2 rounded-xl text-sm font-bold"

            Restore &#x2192;
          </button>
        </div>
      </div>
      );
    }

    // ─── Main App ─────────────────────────────────────────────────────────────────
    function App() {
      const [phase, setPhase] = useState("loading"); // start loading from Firebase
      const [activeTeamIds, setActiveTeamIds] = useState([]);
      const [courtNumbers, setCourtNumbers] = useState([]);
      const [timerDuration, setTimerDuration] = useState(0);
      const [timerDefaultMins, setTimerDefaultMins] = useState(12);
      const [history, setHistory] = useState([]);
      const [standings, setStandings] = useState([]);
      const [round, setRound] = useState(null);
      const [roundNum, setRoundNum] = useState(1);
      const [pending, setPending] = useState({});
      const [roundKey, setRoundKey] = useState(0);
      const [activeTab, setActiveTab] = useState("play");
      const [editTarget, setEditTarget] = useState(null);
      const [pausedIds, setPausedIds] = useState([]);
      const [isAdmin, setIsAdmin] = useState(false);
      const isAdminRef = useRef(false);
      useEffect(() => { isAdminRef.current = isAdmin; }, [isAdmin]);
      const [pinPurpose, setPinPurpose] = useState(null);
      const [presence, setPresence] = useState({ viewers: 0, admins: 0 });
      const [showTimerSettings, setShowTimerSettings] = useState(false);
      const [savedState, setSavedState] = useState(null);

      // ── Timer model ───────────────────────────────────────────────────────
      // Firebase stores: timerRunning (bool), timerStartedAt (ms epoch when
      // last started/resumed), timerPausedSecsLeft (secs left when last paused).
      // Every client computes current secsLeft from wall-clock time — no per-second writes.
      //
      // We keep timer config in REFS so updates are immediately visible to the
      // tick interval without waiting for React's async state batching.
      // Only timerSecsLeft (the display value) is React state.

      const timerRunningRef    = useRef(false);
      const timerStartedAtRef  = useRef(null);   // ms epoch
      const timerPausedSecsRef = useRef(0);       // secs left at last pause/reset
      const timerDurationRef   = useRef(0);
      const alarmFiredRef      = useRef(false);
      const timerTickRef       = useRef(null);

      // React state only for rendering
      const [timerRunning, setTimerRunning]       = useState(false);
      const [timerPausedSecsLeft, setTimerPausedSecsLeft] = useState(0);
      const [timerAlarmed, setTimerAlarmed]       = useState(false);
      const [timerSecsLeft, setTimerSecsLeft]     = useState(0);

      // Sync refs when timerDuration state changes
      useEffect(() => { timerDurationRef.current = timerDuration; }, [timerDuration]);

      // Core compute — reads from refs, always up-to-date
      const computeSecsLeft = () => {
        if (!timerRunningRef.current || !timerStartedAtRef.current) {
          return timerPausedSecsRef.current;
        }
        const elapsed = Math.floor((Date.now() - timerStartedAtRef.current) / 1000);
        return Math.max(0, timerPausedSecsRef.current - elapsed);
      };

      // applyTimerState: update refs AND state in one go, then restart tick
      const applyTimerState = (running, startedAt, pausedSecs) => {
        timerRunningRef.current    = running;
        timerStartedAtRef.current  = startedAt;
        timerPausedSecsRef.current = pausedSecs;
        // Compute display value immediately — no async lag
        const secs = running && startedAt
          ? Math.max(0, pausedSecs - Math.floor((Date.now() - startedAt) / 1000))
          : pausedSecs;
        setTimerSecsLeft(secs);
        setTimerRunning(running);
        setTimerPausedSecsLeft(pausedSecs);
        // Restart tick interval
        clearInterval(timerTickRef.current);
        if (running && startedAt) {
          timerTickRef.current = setInterval(() => {
            const s = computeSecsLeft();
            setTimerSecsLeft(s);
            if (s <= 0) {
              clearInterval(timerTickRef.current);
              if (!alarmFiredRef.current && timerDurationRef.current > 0) {
                alarmFiredRef.current = true;
                playAlarm();
                // Mark expired — don't push to Firebase; let admin see it
                timerRunningRef.current = false;
                setTimerRunning(false);
                setTimerAlarmed(true);
              }
            }
          }, 500);
        }
      };

      // ── 3. CLOUD SYNC LISTENERS ───────────────────────────────────────────
      // Everyone (including admins) listens to Firebase.
      // We track the last write token we pushed so we can skip our own echo.
      const lastWriteToken = useRef(null);

      useEffect(() => {
        const tournamentRef = db.ref('current_tournament');
        tournamentRef.on('value', (snapshot) => {
          const data = snapshot.val();

          // Always mark initial load done
          if (!initialLoadDone.current) {
            initialLoadDone.current = true;
          }

          // No data at all — no active tournament
          if (!data) { setPhase(p => p === "play" ? "waiting" : p); return; }

          // Skip our own writes (echo prevention)
          if (data._writeToken && data._writeToken === lastWriteToken.current) return;

          // Tournament ended / reset
          if (data.phase !== "play") { setPhase("waiting"); return; }

          // Active tournament — update everyone (viewers AND admins)
          updateAllStates(normaliseSnapshot(data));
        });
        return () => tournamentRef.off();
      }, []); // registered once — fires immediately with current DB state

      // Also listen for individual pending game results from other admins
      useEffect(() => {
        const pendingRef = db.ref('current_tournament/pendingResults');
        pendingRef.on('value', (snapshot) => {
          const data = snapshot.val();
          if (!data) return;
          // Convert Firebase object back to our pending map format
          setPending(prev => {
            const merged = { ...prev };
            Object.keys(data).forEach(k => {
              if (!merged[k]) merged[k] = data[k];
            });
            return merged;
          });
        });
        return () => pendingRef.off();
      }, []);

      // Track last-seen roundNum so we only bump roundKey when the round genuinely changes
      const lastSeenRoundNum = useRef(-1);

      // ── pushSnapshot: write full tournament state to Firebase ──────────────
      const pushSnapshot = (snapshot) => {
        const token = Math.random().toString(36).slice(2);
        lastWriteToken.current = token;
        db.ref('current_tournament').set({ ...snapshot, _writeToken: token });
      };

      // ── pushPatch: write a partial update atomically (path + token together)
      const pushPatch = (path, value) => {
        const token = Math.random().toString(36).slice(2);
        lastWriteToken.current = token;
        // Use update() so both writes land in a single Firebase event,
        // preventing the listener from firing with a stale token.
        const update = { _writeToken: token };
        update[path] = value;
        db.ref('current_tournament').update(update);
      };

      // Helper function to update all internal React state from a single data object
      const updateAllStates = (s) => {
        // Register any custom named teams from the snapshot before rebuilding
        if (s.teamRegistry) registerTeams(s.teamRegistry);
        const ns = rebuildStandings(s.activeTeamIds, s.history);

        // Prefer the stored round (so viewers see exactly what admin sees).
        // Fall back to generating it if roundData is missing (e.g. old saves).
        let nr;
        if (s.roundData && s.roundData.courtTeamIds) {
          nr = {
            courts: s.roundData.courtTeamIds.map(pair => pair.map(id => teamById(id)).filter(Boolean)),
            bye: (s.roundData.byeIds || []).map(id => teamById(id)).filter(Boolean),
            paused: (s.roundData.pausedTeamIds || []).map(id => teamById(id)).filter(Boolean),
          };
        } else {
          nr = generateRound(ns, s.courtNumbers.length, s.history.length, s.history, s.pausedIds || []);
        }

        setActiveTeamIds(s.activeTeamIds);
        setCourtNumbers(s.courtNumbers);
        setTimerDuration(s.timerDuration || 0);
        setTimerDefaultMins(s.timerDefaultMins || 12);
        setHistory(s.history);
        setStandings(ns);
        setRound(nr);
        setRoundNum(s.roundNum);
        setPausedIds(s.pausedIds || []);

        // Capture whether this is a new round BEFORE updating the ref
        const isNewRound = s.roundNum !== lastSeenRoundNum.current;
        if (isNewRound) {
          lastSeenRoundNum.current = s.roundNum;
          setPending({});
          setRoundKey((k) => k + 1);
        }

        // Restore timer state — applyTimerState updates refs+state synchronously
        alarmFiredRef.current = false; // re-arm alarm for new session
        const running  = s.timerRunning || false;
        const startedAt = s.timerStartedAt || null;
        const pausedSecs = s.timerPausedSecsLeft ?? s.timerDuration ?? 0;
        applyTimerState(running, startedAt, pausedSecs);

        setPhase("play");
      };

      // ── On mount: continuous listener handles initial load ─────────────────
      // The on('value') listener always fires immediately with current DB state.
      // initialLoadDone tracks whether we've received the first snapshot yet.
      const initialLoadDone = useRef(false);
      useEffect(() => {
        const saved = loadState();
        if (saved && saved.phase === "play") setSavedState(saved);
        // Fallback: if Firebase hasn't responded in 4s, show waiting screen
        const timeout = setTimeout(() => {
          if (!initialLoadDone.current) { initialLoadDone.current = true; setPhase("waiting"); }
        }, 4000);
        return () => clearTimeout(timeout);
      }, []); // eslint-disable-line react-hooks/exhaustive-deps

      // ── Presence tracking ─────────────────────────────────────────────────
      // Use Firebase's onDisconnect to clean up automatically
      useEffect(() => {
        const presenceRef = db.ref('presence').push();
        presenceRef.set({ role: isAdmin ? 'admin' : 'viewer', joinedAt: Date.now() });
        presenceRef.onDisconnect().remove();

        const allPresenceRef = db.ref('presence');
        allPresenceRef.on('value', (snap) => {
          const data = snap.val() || {};
          const entries = Object.values(data);
          setPresence({
            viewers: entries.filter(e => e.role === 'viewer').length,
            admins: entries.filter(e => e.role === 'admin').length,
          });
        });

        return () => {
          presenceRef.remove();
          allPresenceRef.off();
        };
      }, [isAdmin]); // re-register when role changes

      // ── Auto-save (LOCAL & CLOUD) ───────────────────────────────────────────
      useEffect(() => {
        if (phase !== "play") return;

        // Serialise current round as plain IDs so Firebase can store it
        const roundData = (round && round.courts && round.courts.length > 0) ? {
          courtTeamIds: round.courts.map(pair => pair.map(t => t.id)),
          byeIds: (round.bye || []).map(t => t.id),
          pausedTeamIds: (round.paused || []).map(t => t.id),
        } : null;

        const snapshot = {
          phase, activeTeamIds, courtNumbers, timerDuration, timerDefaultMins,
          history, roundNum, pausedIds, roundData,
          timerRunning,
          timerStartedAt: timerStartedAtRef.current,
          timerPausedSecsLeft: timerPausedSecsRef.current,
          savedAt: Date.now(),
        };
        
        // Always save locally (Backup)
        saveState(snapshot);

        // ONLY push to cloud if we are the Admin making the changes
        if (isAdminRef.current) {
          pushSnapshot(snapshot);
        }
      }, [phase, history, roundNum, pausedIds, timerRunning, timerPausedSecsLeft, activeTeamIds, courtNumbers, timerDuration, timerDefaultMins]);

      const handleRestore = () => {
        const s = savedState;
        setSavedState(null);
        updateAllStates(normaliseSnapshot(s)); // normalise + handle timer fields
        setActiveTab("play");
      };

      // ── pushTimerState: write timer fields to Firebase (admin only) ────────
      const pushTimerState = (running, startedAt, pausedSecsLeft) => {
        pushPatch('timerRunning', running);
        pushPatch('timerStartedAt', startedAt);
        pushPatch('timerPausedSecsLeft', pausedSecsLeft);
      };

      // ── resetTimer: reset clock locally + push to Firebase ────────────────
      const resetTimer = (newSecs) => {
        alarmFiredRef.current = false;
        const secs = newSecs ?? timerDuration;
        setTimerAlarmed(false);
        applyTimerState(false, null, secs);
        if (isAdmin) pushTimerState(false, null, secs);
      };

      const numCourts = courtNumbers.length;
      const courtKey = (idx) => `court_${idx}`;

      const handleStart = (allTeams, teamIds, courts, durSecs) => {
        registerTeams(allTeams);
        const s = mkStandings(teamIds);
        const r = generateRound(s, courts.length, 0, [], []);

        const roundData = {
          courtTeamIds: r.courts.map(pair => pair.map(t => t.id)),
          byeIds: r.bye.map(t => t.id),
          pausedTeamIds: [],
        };
        const startedAt = durSecs > 0 ? Date.now() : null;
        const snapshot = {
          phase: "play", activeTeamIds: teamIds, courtNumbers: courts,
          teamRegistry: allTeams,
          timerDuration: durSecs, timerDefaultMins: 12,
          history: [], roundNum: 1, pausedIds: [],
          timerRunning: durSecs > 0, timerStartedAt: startedAt,
          timerPausedSecsLeft: durSecs,
          roundData, savedAt: Date.now(),
        };
        saveState(snapshot);
        pushSnapshot(snapshot);

        // Become Admin on start
        setIsAdmin(true);

        setActiveTeamIds(teamIds); setCourtNumbers(courts); setTimerDuration(durSecs);
        setStandings(s); setRound(r); setRoundNum(1); setHistory([]);
        lastSeenRoundNum.current = 1; // prevent echo from triggering isNewRound
        setPending({}); setPausedIds([]); setRoundKey(0);
        alarmFiredRef.current = false;
        setTimerAlarmed(false);
        applyTimerState(durSecs > 0, startedAt, durSecs);
        setPhase("play"); setActiveTab("play");
      };

      const handleResetClick = () => setPinPurpose("reset");

      const handlePinSuccess = () => {
        if (pinPurpose === "admin") { setIsAdmin(true); }
        else if (pinPurpose === "reset") {
          clearSave();
          // Clear Cloud too
          pushSnapshot(null);
          lastSeenRoundNum.current = -1;
          setPhase("setup"); // admin goes to setup to configure new tournament
          setIsAdmin(false);
          setHistory([]);
          setStandings([]);
          setRound(null);
          setPausedIds([]);
          setPending({});
          resetTimer(0);
        }
        setPinPurpose(null);
      };

      const handleTogglePause = (id) => {
        setPausedIds((prev) => {
          const next = prev.includes(id) ? prev.filter((x) => x !== id) : [...prev, id];
          const nr = generateRound(standings, numCourts, history.length, history, next);

          // Immediately push updated round to Firebase
          if (isAdmin) {
            const roundData = {
              courtTeamIds: nr.courts.map(pair => pair.map(t => t.id)),
              byeIds: nr.bye.map(t => t.id),
              pausedTeamIds: (nr.paused || []).map(t => t.id),
            };
            pushPatch('roundData', roundData);
            pushPatch('pausedIds', next);
          }

          setRound(nr); setPending({}); setRoundKey((k) => k + 1);
          return next;
        });
      };

      const handleResult = (courtIdx, result) => {
        warmUpAudio();
        const key = courtKey(courtIdx);
        const np = { ...pending, [key]: result };
        setPending(np);

        // Push individual game result immediately so other admins see it
        if (isAdmin) {
          pushPatch(`pendingResults/${key}`, result);
        }

        if (round.courts.every((_, idx) => np[courtKey(idx)])) {
          const games = round.courts.map((_, idx) => ({ ...np[courtKey(idx)], courtNumber: courtNumbers[idx] ?? idx + 1 }));
          const entry = { roundNum, games, bye: round.bye.map((t) => t.id), paused: (round.paused || []).map((t) => t.id) };
          const nh = [...history, entry];
          const ns = rebuildStandings(activeTeamIds, nh);
          const nr = generateRound(ns, numCourts, nh.length, nh, pausedIds);
          const newRoundNum = roundNum + 1;

          // Push new round to Firebase immediately (don't wait for effect)
          if (isAdmin) {
            const roundData = {
              courtTeamIds: nr.courts.map(pair => pair.map(t => t.id)),
              byeIds: nr.bye.map(t => t.id),
              pausedTeamIds: (nr.paused || []).map(t => t.id),
            };
            const newStartedAt = timerDuration > 0 ? Date.now() : null;
            const snapshot = {
              phase: "play", activeTeamIds, courtNumbers,
              teamRegistry: TEAM_REGISTRY,
              timerDuration, timerDefaultMins,
              history: nh, roundNum: newRoundNum, pausedIds,
              timerRunning: timerDuration > 0,
              timerStartedAt: newStartedAt,
              timerPausedSecsLeft: timerDuration,
              roundData, savedAt: Date.now(),
            };
            saveState(snapshot);
            pushSnapshot(snapshot);
            pushPatch('pendingResults', null);
          }

          lastSeenRoundNum.current = newRoundNum; // prevent echo from triggering isNewRound
          setHistory(nh); setStandings(ns); setRound(nr);
          setRoundNum(newRoundNum); setPending({}); setRoundKey((k) => k + 1);
          alarmFiredRef.current = false;
          setTimerAlarmed(false);
          const newStartedAtLocal = timerDuration > 0 ? Date.now() : null;
          applyTimerState(timerDuration > 0, newStartedAtLocal, timerDuration);
        }
      };

      const handleEditSave = (ri, gameIdx, newGame) => {
        const nh = history.map((h, i) =>
          i !== ri ? h : { ...h, games: h.games.map((g, gi) => gi !== gameIdx ? g : { ...g, ...newGame }) }
        );
        const ns = rebuildStandings(activeTeamIds, nh);
        const nr = generateRound(ns, numCourts, nh.length, nh, pausedIds);
        if (isAdmin) pushPatch('history', nh);
        setHistory(nh); setStandings(ns);
        setRound(nr);
        setEditTarget(null);
      };

      const handleSaveTimerSettings = (newMins) => {
        setTimerDefaultMins(newMins);
        setTimerDuration(newMins * 60);
      };

      const ranked = rerank(standings);
      const activeCourts = round ? round.courts.length : numCourts;
      const waitingFor = Array.from({ length: activeCourts }, (_, idx) => courtNumbers[idx] ?? idx + 1)
        .filter((_, idx) => !pending[courtKey(idx)]);
      const doneCount = activeCourts - waitingFor.length;

      return (
        <div className="min-h-screen p-4" onClick={warmUpAudio}
          style={{ background: "radial-gradient(ellipse at top,#1e1b4b 0%,#0a0a0f 60%)", fontFamily: "'Trebuchet MS',sans-serif", color: "#e2e8f0" }}>

          {pinPurpose && (
            <PinModal
              title={pinPurpose === "reset" ? "PIN required to reset" : "Admin PIN"}
              onSuccess={handlePinSuccess}
              onClose={() => setPinPurpose(null)}
            />
          )}
          {showTimerSettings && (
            <TimerSettingsModal currentMins={timerDefaultMins} onSave={handleSaveTimerSettings} onClose={() => setShowTimerSettings(false)} />
          )}
          {editTarget && (
            <EditModal
              game={history[editTarget.ri].games[editTarget.gameIdx]}
              label={`Round ${history[editTarget.ri].roundNum} · Court ${history[editTarget.ri].games[editTarget.gameIdx].courtNumber}`}
              onSave={(g) => handleEditSave(editTarget.ri, editTarget.gameIdx, g)}
              onClose={() => setEditTarget(null)} />
          )}

          <div className="max-w-2xl mx-auto">
            <div className="text-center mb-5">
              <h1 className="text-3xl font-black tracking-tight mb-1"
                style={{ background: "linear-gradient(90deg,#a5b4fc,#f0abfc)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
                Tournament: Not A Round Robin
              </h1>
              <div className="flex flex-col items-center gap-1">
                <div className="flex items-center justify-center gap-3 flex-wrap">
                  {phase === "play" && (
                    <p className="text-slate-400 text-sm">
                      {activeTeamIds.length} teams · {isAdmin ? '🟢 Admin Mode' : '🔵 Live Viewer'}
                    </p>
                  )}
                  {phase === "setup" && <p className="text-slate-400 text-sm">Tournament Setup</p>}
                  {(phase === "waiting" || phase === "loading") && !isAdmin && (
                    <p className="text-slate-400 text-sm">🔵 Live Viewer</p>
                  )}
                  <button
                    onClick={() => { if (isAdmin) setIsAdmin(false); else setPinPurpose("admin"); }}
                    className="text-xs px-2 py-1 rounded-lg font-bold"
                    style={{ background: isAdmin ? "rgba(251,191,36,0.15)" : "rgba(255,255,255,0.05)",
                      color: isAdmin ? "#fbbf24" : "#475569", cursor: "pointer",
                      border: `1px solid ${isAdmin ? "rgba(251,191,36,0.4)" : "rgba(255,255,255,0.08)"}` }}>
                    {isAdmin ? "🔓 Admin" : "🔒"}
                  </button>
                </div>
                {phase === "play" && (
                  <div className="flex items-center gap-3 text-xs text-slate-600">
                    {presence.admins > 0 && <span>🟢 {presence.admins} admin{presence.admins !== 1 ? 's' : ''}</span>}
                    <span>🔵 {presence.viewers} viewer{presence.viewers !== 1 ? 's' : ''}</span>
                  </div>
                )}
              </div>
            </div>

            {(phase === "loading" || phase === "waiting") && !isAdmin && (
              <div className="rounded-2xl p-10 text-center flex flex-col items-center gap-4"
                style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)" }}>
                {phase === "loading" ? (
                  <>
                    <div className="text-3xl">🔄</div>
                    <p className="text-slate-400 text-sm">Connecting to tournament…</p>
                  </>
                ) : (
                  <>
                    <div className="text-3xl">🏓</div>
                    <p className="text-slate-300 font-bold">No active tournament</p>
                    <p className="text-slate-500 text-sm">Waiting for the admin to start a game.</p>
                    {savedState && (
                      <RestoreBanner saved={savedState} onRestore={handleRestore} onDiscard={() => { setSavedState(null); clearSave(); }} />
                    )}
                  </>
                )}
              </div>
            )}

            {/* Admin sees setup screen when no tournament is running */}
            {(phase === "loading" || phase === "waiting" || phase === "setup") && isAdmin && (
              <>
                {savedState && (
                  <RestoreBanner saved={savedState} onRestore={handleRestore} onDiscard={() => { setSavedState(null); clearSave(); }} />
                )}
                <SetupScreen onStart={handleStart} />
              </>
            )}

            {phase === "play" && (
              <>
                {timerDuration > 0 && (
                  <RoundTimer
                    secsLeft={timerSecsLeft} totalSecs={timerDuration} roundNum={roundNum}
                    timerRunning={timerRunning} isAdmin={isAdmin}
                    onToggle={() => {
                      if (!timerRunning) {
                        // Resume
                        const startedAt = Date.now();
                        applyTimerState(true, startedAt, timerPausedSecsRef.current);
                        pushTimerState(true, startedAt, timerPausedSecsRef.current);
                      } else {
                        // Pause — snapshot current computed secs
                        const secs = computeSecsLeft();
                        applyTimerState(false, null, secs);
                        pushTimerState(false, null, secs);
                      }
                    }}
                    onRestart={() => resetTimer(timerDuration)}
                    onOpenSettings={() => setShowTimerSettings(true)}
                  />
                )}

                <div className="flex gap-2 mb-4 mt-2">
                  {[["play","🎾 Play"],["standings","🏆 Standings"],["history","📋 History"]].map(([id, label]) => (
                    <button key={id} onClick={() => setActiveTab(id)} className="flex-1 py-2 rounded-xl text-sm font-bold"
                      style={{ background: activeTab === id ? "linear-gradient(90deg,#6366f1,#8b5cf6)" : "rgba(255,255,255,0.05)",
                        color: activeTab === id ? "#fff" : "#94a3b8", cursor: "pointer",
                        border: activeTab === id ? "none" : "1px solid rgba(255,255,255,0.08)" }}>
                      {label}
                    </button>
                  ))}
                </div>

                {activeTab === "play" && round && (
                  <div className="flex flex-col gap-4">
                    <div className="flex items-center justify-between flex-wrap gap-2">
                      <span className="text-indigo-300 font-bold text-sm">Round {roundNum}</span>
                      <div className="flex items-center gap-2 flex-wrap">
                        {round.paused?.length > 0 && (
                          <div className="flex items-center gap-1 flex-wrap">
                            <span className="text-slate-500 text-xs">⏸</span>
                            {round.paused.map((t) => <TeamChip key={t.id} teamId={t.id} />)}
                          </div>
                        )}
                        {round.bye.length > 0 && (
                          <div className="flex items-center gap-1 flex-wrap">
                            <span className="text-slate-500 text-xs">Bye:</span>
                            {round.bye.map((t) => <TeamChip key={t.id} teamId={t.id} />)}
                          </div>
                        )}
                      </div>
                    </div>
                    
                    {isAdmin ? (
                      round.courts.map((teams, idx) => (
                        <CourtCard key={`${roundKey}-court-${idx}`} courtLabel={`Court ${courtNumbers[idx] ?? idx + 1}`}
                          teams={teams} onResult={(r) => handleResult(idx, r)} done={!!pending[courtKey(idx)]} />
                      ))
                    ) : (
                      <div className="flex flex-col gap-4">
                        {round.courts.map((teams, idx) => (
                          <div key={idx} className="rounded-2xl p-5 border border-slate-700 bg-slate-900/50">
                            <p className="text-xs text-indigo-400 font-mono mb-2 uppercase">Court {courtNumbers[idx] ?? idx+1}</p>
                            <div className="flex justify-between items-center">
                              <TeamChip teamId={teams[0].id} />
                              <span className="text-slate-600 text-xs px-2">VS</span>
                              <TeamChip teamId={teams[1].id} />
                            </div>
                          </div>
                        ))}
                      </div>
                    )}

                    {isAdmin && <PausePanel activeTeamIds={activeTeamIds} pausedIds={pausedIds} onTogglePause={handleTogglePause} />}
                    {isAdmin && (
                      <button onClick={handleResetClick}
                        style={{ cursor: "pointer", background: "none", border: "none", color: "#475569", fontSize: 12, textDecoration: "underline" }}>
                        ↩ Back to setup (resets tournament)
                      </button>
                    )}
                  </div>
                )}

                {activeTab === "standings" && (
                  <div className="rounded-2xl overflow-hidden" style={{ border: "1px solid rgba(255,255,255,0.08)" }}>
                    <div className="flex items-center px-4 py-2 gap-2 text-xs font-bold text-slate-500 uppercase tracking-widest"
                      style={{ background: "rgba(99,102,241,0.15)" }}>
                      <span style={{ width: 36 }}></span><span style={{ width: 14 }}></span>
                      <span className="flex-1">Team</span>
                      <span style={{ width: 34, textAlign: "center" }}>GP</span>
                      <span style={{ width: 34, textAlign: "center", color: "#4ade80" }}>W</span>
                      <span style={{ width: 34, textAlign: "center", color: "#f87171" }}>L</span>
                      <span style={{ width: 44, textAlign: "center", color: "#a5b4fc" }}>+/−</span>
                    </div>
                    {ranked.map((team, i) => {
                      const diff = team.scoreDiff, paused = pausedIds.includes(team.id);
                      return (
                        <div key={team.id} className="flex items-center px-4 py-3 gap-2"
                          style={{ background: i % 2 === 0 ? "rgba(255,255,255,0.02)" : "transparent",
                            borderTop: "1px solid rgba(255,255,255,0.04)", opacity: paused ? 0.5 : 1 }}>
                          <span className="text-xs font-bold text-slate-500" style={{ width: 36 }}>
                            {i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : ORDINAL(i + 1)}
                          </span>
                          <div className="w-3 h-3 rounded-full flex-shrink-0"
                            style={{ background: team.color, boxShadow: `0 0 5px ${team.color}` }} />
                          <span className="font-bold text-sm flex-1">{team.name}{paused ? " ⏸" : ""}</span>
                          <span style={{ width: 34, textAlign: "center", color: "#94a3b8", fontSize: 13 }}>{team.played}</span>
                          <span style={{ width: 34, textAlign: "center", color: "#4ade80", fontWeight: 700, fontSize: 13 }}>{team.wins}</span>
                          <span style={{ width: 34, textAlign: "center", color: "#f87171", fontWeight: 700, fontSize: 13 }}>{team.losses}</span>
                          <span style={{ width: 44, textAlign: "center", fontWeight: 700, fontSize: 13,
                            color: diff > 0 ? "#34d399" : diff < 0 ? "#f87171" : "#94a3b8" }}>
                            {diff > 0 ? "+" : ""}{diff}
                          </span>
                        </div>
                      );
                    })}
                  </div>
                )}

                {activeTab === "history" && (
                  <div className="flex flex-col gap-3">
                    {history.length === 0 && <div className="text-center text-slate-500 py-8 text-sm">No rounds completed yet.</div>}
                    {[...history].reverse().map((h, revI) => {
                      const ri = history.length - 1 - revI;

                      // Compute rankings before and after this round
                      const standingsBefore = rebuildStandings(activeTeamIds, history.slice(0, ri));
                      const standingsAfter  = rebuildStandings(activeTeamIds, history.slice(0, ri + 1));
                      const ranksBefore = rerank(standingsBefore); // index = rank-1
                      const ranksAfter  = rerank(standingsAfter);
                      const rankBefore = (id) => ranksBefore.findIndex(t => t.id === id) + 1;
                      const rankAfter  = (id) => ranksAfter.findIndex(t => t.id === id)  + 1;

                      // Collect all team IDs that played this round
                      const playedIds = h.games.flatMap(g => [g.winnerId, g.loserId]);

                      return (
                        <div key={ri} className="rounded-2xl p-4"
                          style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)" }}>
                          <div className="text-xs text-indigo-400 font-bold mb-3 uppercase tracking-widest">Round {h.roundNum}</div>
                          {h.games.map((game, gi) => {
                            const w = teamById(game.winnerId), l = teamById(game.loserId);
                            return (
                              <div key={gi} className="mb-2" style={{
                                display: "grid",
                                gridTemplateColumns: "64px 1fr 28px 12px 28px 1fr auto",
                                alignItems: "center",
                                gap: "6px",
                              }}>
                                <span className="text-slate-500 text-xs truncate">Court {game.courtNumber}</span>
                                <div className="flex justify-end"><TeamChip teamId={game.winnerId} /></div>
                                <span className="font-bold text-sm text-right" style={{ color: w?.color }}>{game.winnerScore}</span>
                                <span className="text-slate-600 text-xs text-center">–</span>
                                <span className="font-bold text-sm text-left" style={{ color: l?.color }}>{game.loserScore}</span>
                                <div className="flex justify-start"><TeamChip teamId={game.loserId} /></div>
                                <div>
                                  {isAdmin && (
                                    <button onClick={() => setEditTarget({ ri, gameIdx: gi })}
                                      className="text-xs px-2 py-1 rounded-lg"
                                      style={{ background: "rgba(99,102,241,0.15)", color: "#a5b4fc",
                                        border: "1px solid rgba(99,102,241,0.3)", cursor: "pointer", whiteSpace: "nowrap" }}>
                                      &#x270F;&#xFE0F; Edit
                                    </button>
                                  )}
                                </div>
                              </div>
                            );
                          })}
                          {h.bye?.length > 0 && (
                            <div className="flex items-center gap-2 mt-2 flex-wrap">
                              <span className="text-slate-500 text-xs" style={{ minWidth: 58 }}>Bye</span>
                              {h.bye.map((id) => <TeamChip key={id} teamId={id} />)}
                            </div>
                          )}
                          {/* Ranking changes */}
                          <div className="mt-3 pt-2" style={{ borderTop: "1px solid rgba(255,255,255,0.06)" }}>
                            <p className="text-xs text-slate-600 mb-1 uppercase tracking-wide">Rankings</p>
                            <div className="flex flex-wrap gap-x-4 gap-y-1">
                              {playedIds.map(id => {
                                const before = rankBefore(id), after = rankAfter(id);
                                const delta = before - after; // positive = moved up
                                const t = teamById(id);
                                if (!t) return null;
                                return (
                                  <div key={id} className="flex items-center gap-1 text-xs">
                                    <span style={{ color: t.color, fontWeight: 700 }}>{t.name}</span>
                                    <span className="text-slate-600">#{before}</span>
                                    <span className="text-slate-600">→</span>
                                    <span style={{ fontWeight: 700, color: delta > 0 ? "#4ade80" : delta < 0 ? "#f87171" : "#94a3b8" }}>
                                      #{after}
                                    </span>
                                    {delta > 0 && <span style={{ color: "#4ade80", fontSize: 10 }}>▲{delta}</span>}
                                    {delta < 0 && <span style={{ color: "#f87171", fontSize: 10 }}>▼{Math.abs(delta)}</span>}
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
