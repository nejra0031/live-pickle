<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pickleball Ladder (Live)</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; padding: 0; background: #0a0a0f; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const firebaseConfig = {
      apiKey: "AIzaSyBWcUvEUzlvUb0CwM_GsjLY0AmiYHa8GhA",
      authDomain: "live-pickle.firebaseapp.com",
      databaseURL: "https://live-pickle-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "live-pickle",
      storageBucket: "live-pickle.firebasestorage.app",
      messagingSenderId: "419584191740",
      appId: "1:419584191740:web:430fdc01037a21838bfb79"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();
    const tournamentRef = db.ref('current_tournament');

    // ─── Team Definitions ───
    const ALL_TEAMS = [
      { id: "red",    name: "Red",    color: "#ef4444", text: "#fff" },
      { id: "blue",   name: "Blue",   color: "#3b82f6", text: "#fff" },
      { id: "yellow", name: "Yellow", color: "#eab308", text: "#000" },
      { id: "green",  name: "Green",  color: "#22c55e", text: "#fff" },
      { id: "orange", name: "Orange", color: "#f97316", text: "#fff" },
      { id: "purple", name: "Purple", color: "#a855f7", text: "#fff" },
      { id: "pink",   name: "Pink",   color: "#ec4899", text: "#fff" },
      { id: "grey",   name: "Grey",   color: "#6b7280", text: "#fff" },
      { id: "brown",  name: "Brown",  color: "#92400e", text: "#fff" },
      { id: "teal",   name: "Teal",   color: "#14b8a6", text: "#fff" },
      { id: "lime",   name: "Lime",   color: "#84cc16", text: "#000" },
      { id: "cyan",   name: "Cyan",   color: "#06b6d4", text: "#000" },
      { id: "indigo", name: "Indigo", color: "#6366f1", text: "#fff" },
      { id: "rose",   name: "Rose",   color: "#f43f5e", text: "#fff" },
      { id: "amber",  name: "Amber",  color: "#f59e0b", text: "#000" },
      { id: "navy",   name: "Navy",   color: "#1e40af", text: "#fff" },
      { id: "mint",   name: "Mint",   color: "#6ee7b7", text: "#000" },
      { id: "coral",  name: "Coral",  color: "#fb7185", text: "#fff" },
      { id: "sky",    name: "Sky",    color: "#38bdf8", text: "#000" },
      { id: "gold",   name: "Gold",   color: "#d97706", text: "#fff" },
    ];
    const teamById = (id) => ALL_TEAMS.find((t) => t.id === id);

    // ─── Logic Helpers ───
    function mkStandings(teamIds) {
      return teamIds.map((id) => ({
        ...teamById(id), wins: 0, losses: 0, scoreDiff: 0, played: 0,
        lastPlayedRound: -999, lastByeRound: -999,
      }));
    }
    function rerank(standings) {
      return [...standings].sort((a, b) => {
        if (b.wins !== a.wins) return b.wins - a.wins;
        if (b.scoreDiff !== a.scoreDiff) return b.scoreDiff - a.scoreDiff;
        return a.played - b.played;
      });
    }
    function rebuildStandings(teamIds, history) {
      const map = Object.fromEntries(mkStandings(teamIds).map((t) => [t.id, { ...t }]));
      (history || []).forEach((round, ri) => {
        round.games.forEach((game) => {
          const w = map[game.winnerId], l = map[game.loserId];
          if (!w || !l) return;
          w.wins++; w.scoreDiff += game.winnerScore - game.loserScore; w.played++; w.lastPlayedRound = ri;
          l.losses++; l.scoreDiff += game.loserScore - game.winnerScore; l.played++; l.lastPlayedRound = ri;
        });
        (round.bye || []).forEach((id) => { if (map[id]) map[id].lastByeRound = ri; });
      });
      return Object.values(map);
    }

    // ─── Scheduling (Combinations & Scoring) ───
    function combinations(arr, k) {
      if (k === 0) return [[]];
      if (arr.length < k) return [];
      const [first, ...rest] = arr;
      return [...combinations(rest, k - 1).map((c) => [first, ...c]), ...combinations(rest, k)];
    }
    function buildByeCounts(history) {
      const solo = {}, pairs = {};
      (history || []).forEach((round) => {
        const ids = round.bye || [];
        ids.forEach((id) => { solo[id] = (solo[id] || 0) + 1; });
        for (let i = 0; i < ids.length; i++)
          for (let j = i + 1; j < ids.length; j++) {
            const key = [ids[i], ids[j]].sort().join("|");
            pairs[key] = (pairs[key] || 0) + 1;
          }
      });
      return { solo, pairs };
    }
    function scoreByeGroup(ids, { solo, pairs }) {
      let pairScore = 0, soloScore = 0;
      for (let i = 0; i < ids.length; i++) {
        soloScore += solo[ids[i]] || 0;
        for (let j = i + 1; j < ids.length; j++) {
          const key = [ids[i], ids[j]].sort().join("|");
          pairScore += pairs[key] || 0;
        }
      }
      return pairScore * 1000 + soloScore + Math.random() * 0.001;
    }
    function generateRound(allStandings, numCourts, roundIdx, history = [], pausedIds = []) {
      const pausedSet = new Set(pausedIds);
      const active = allStandings.filter((t) => !pausedSet.has(t.id));
      const numBye = active.length - numCourts * 2;
      if (numBye <= 0) {
        const usableCourts = Math.floor(active.length / 2);
        return { courts: chunkByRank(active, usableCourts, allStandings), bye: [], paused: allStandings.filter((t) => pausedSet.has(t.id)).map(t=>t.id) };
      }
      const byeCounts = buildByeCounts(history);
      const lastRoundByeIds = history.length > 0 ? new Set(history[history.length - 1].bye || []) : new Set();
      const byMostPlayed = [...active].sort((a, b) => b.played - a.played);
      const byeGroup = [];
      let idx = 0;
      while (byeGroup.length < numBye && idx < byMostPlayed.length) {
        const currentPlayed = byMostPlayed[idx].played;
        const tier = [];
        while (idx < byMostPlayed.length && byMostPlayed[idx].played === currentPlayed) tier.push(byMostPlayed[idx++]);
        const slotsLeft = numBye - byeGroup.length;
        if (tier.length <= slotsLeft) {
          byeGroup.push(...tier);
        } else {
          const combos = combinations(tier, slotsLeft);
          let bestCombo = combos[0], bestScore = Infinity;
          for (const combo of combos) {
            const ids = combo.map((t) => t.id);
            let score = scoreByeGroup(ids, byeCounts);
            score += ids.filter((id) => lastRoundByeIds.has(id)).length * 1_000_000;
            if (score < bestScore) { bestScore = score; bestCombo = combo; }
          }
          byeGroup.push(...bestCombo);
        }
      }
      const byeIds = new Set(byeGroup.map((t) => t.id));
      const playing = active.filter((t) => !byeIds.has(t.id));
      return { courts: chunkByRank(playing, numCourts, allStandings), bye: byeGroup.map(t=>t.id), paused: allStandings.filter((t) => pausedSet.has(t.id)).map(t=>t.id) };
    }
    function chunkByRank(playing, numCourts, allStandings) {
      const ranked = rerank(allStandings);
      const rankOf = (id) => ranked.findIndex((t) => t.id === id);
      const byRank = [...playing].sort((a, b) => rankOf(a.id) - rankOf(b.id));
      const courts = [];
      for (let c = 0; c < numCourts; c++)
        if (byRank[c * 2] && byRank[c * 2 + 1]) courts.push([byRank[c * 2].id, byRank[c * 2 + 1].id]);
      return courts;
    }

    // ─── UI Components ───
    const ORDINAL = (n) => { const s = ["th","st","nd","rd"], v = n % 100; return n + (s[(v-20)%10] || s[v] || s[0]); };

    function TeamChip({ teamId }) {
      const team = teamById(teamId);
      if (!team) return null;
      return (
        <span className="inline-flex items-center rounded-full px-2 py-1 text-xs font-semibold"
          style={{ background: team.color, color: team.text, border: "2px solid rgba(255,255,255,0.15)" }}>
          {team.name}
        </span>
      );
    }

    function NumInput({ value, onChange }) {
      return (
        <input type="number" min={0} max={99} value={value}
          onChange={(e) => onChange(e.target.value === "" ? "" : Number(e.target.value))}
          style={{ width: 54, textAlign: "center", padding: "5px 0", background: "rgba(255,255,255,0.08)",
            border: "1px solid rgba(255,255,255,0.2)", borderRadius: 8, color: "#e2e8f0", fontWeight: 700, fontSize: 14, outline: "none" }} />
      );
    }

    // (Modals: PinModal, TimerSettingsModal, RoundTimer, CourtCard, EditModal, SetupScreen, PausePanel, RestoreBanner)
    // ... [Components remain essentially the same as your previous version, logic moved to App for sync] ...
    
    // ─── Main App ───
    function App() {
      const [phase, setPhase] = useState("setup");
      const [activeTeamIds, setActiveTeamIds] = useState([]);
      const [courtNumbers, setCourtNumbers] = useState([]);
      const [timerDuration, setTimerDuration] = useState(0);
      const [timerDefaultMins, setTimerDefaultMins] = useState(12);
      const [history, setHistory] = useState([]);
      const [standings, setStandings] = useState([]);
      const [round, setRound] = useState(null);
      const [roundNum, setRoundNum] = useState(1);
      const [pending, setPending] = useState({});
      const [activeTab, setActiveTab] = useState("play");
      const [pausedIds, setPausedIds] = useState([]);
      const [isAdmin, setIsAdmin] = useState(false);
      const [pinPurpose, setPinPurpose] = useState(null);
      const [timerEndTime, setTimerEndTime] = useState(0);
      const [timerRunning, setTimerRunning] = useState(false);
      const [timerSecsLeft, setTimerSecsLeft] = useState(0);

      // Listen for Database Changes
      useEffect(() => {
        const unsubscribe = tournamentRef.on('value', (snapshot) => {
          const data = snapshot.val();
          if (data && !isAdmin) {
            setPhase(data.phase);
            setActiveTeamIds(data.activeTeamIds || []);
            setCourtNumbers(data.courtNumbers || []);
            setTimerDuration(data.timerDuration || 0);
            setHistory(data.history || []);
            setRoundNum(data.roundNum || 1);
            setPausedIds(data.pausedIds || []);
            setRound(data.round); 
            setTimerEndTime(data.timerEndTime || 0);
            setTimerRunning(data.timerRunning || false);
            setStandings(rebuildStandings(data.activeTeamIds, data.history));
          }
        });
        return () => tournamentRef.off('value', unsubscribe);
      }, [isAdmin]);

      // Admin Local Update -> Push to DB
      useEffect(() => {
        if (isAdmin && phase === "play") {
          tournamentRef.set({
            phase, activeTeamIds, courtNumbers, timerDuration, 
            history, roundNum, pausedIds, round, timerEndTime, timerRunning
          });
        }
      }, [phase, history, roundNum, pausedIds, activeTeamIds, courtNumbers, round, timerEndTime, timerRunning, isAdmin]);

      // Timer Logic (Synced via EndTime)
      useEffect(() => {
        const interval = setInterval(() => {
          if (timerRunning && timerEndTime > 0) {
            const left = Math.max(0, Math.floor((timerEndTime - Date.now()) / 1000));
            setTimerSecsLeft(left);
            if (left === 0) setTimerRunning(false);
          } else {
            setTimerSecsLeft(timerDuration);
          }
        }, 500);
        return () => clearInterval(interval);
      }, [timerRunning, timerEndTime, timerDuration]);

      const handleStart = (teamIds, courts, durSecs) => {
        const s = mkStandings(teamIds);
        const r = generateRound(s, courts.length, 0, [], []);
        setIsAdmin(true);
        setActiveTeamIds(teamIds); setCourtNumbers(courts); setTimerDuration(durSecs);
        setStandings(s); setRound(r); setRoundNum(1); setHistory([]);
        setTimerEndTime(durSecs > 0 ? Date.now() + durSecs * 1000 : 0);
        setTimerRunning(durSecs > 0);
        setPhase("play");
      };

      const handleResult = (courtIdx, result) => {
        const key = `court_${courtIdx}`;
        const np = { ...pending, [key]: result };
        setPending(np);
        if (round.courts.every((_, idx) => np[`court_${idx}`])) {
          const games = round.courts.map((_, idx) => ({ ...np[`court_${idx}`], courtNumber: courtNumbers[idx] }));
          const entry = { roundNum, games, bye: round.bye, paused: round.paused };
          const nh = [...history, entry];
          const ns = rebuildStandings(activeTeamIds, nh);
          const nr = generateRound(ns, courtNumbers.length, nh.length, nh, pausedIds);
          setHistory(nh); setStandings(ns); setRound(nr);
          setRoundNum(n => n + 1); setPending({});
          setTimerEndTime(timerDuration > 0 ? Date.now() + timerDuration * 1000 : 0);
          setTimerRunning(timerDuration > 0);
        }
      };

      // ... [Remaining UI Logic for Standings/History/Modals] ...

      return (
        <div className="min-h-screen p-4 bg-[#0a0a0f] text-[#e2e8f0]">
          {/* Use your existing UI structure here, but point to the state variables defined above */}
          <div className="max-w-2xl mx-auto">
             <header className="text-center mb-8">
                <h1 className="text-3xl font-black text-indigo-400">Live Pickleball</h1>
                <p className="text-xs text-slate-500 uppercase tracking-widest">
                  {isAdmin ? "Admin Control" : "View Only Mode"}
                </p>
             </header>

             {phase === "setup" ? (
               <button onClick={() => handleStart(["red","blue","yellow","green","orange","pink"], [1,2], 720)} className="w-full p-4 bg-indigo-600 rounded-xl font-bold">Start Demo Tournament</button>
             ) : (
               <>
                 <nav className="flex gap-2 mb-6">
                    {["play", "standings", "history"].map(tab => (
                      <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-1 py-2 rounded-lg font-bold capitalize ${activeTab === tab ? 'bg-indigo-600' : 'bg-slate-800'}`}>{tab}</button>
                    ))}
                 </nav>

                 {activeTab === "play" && round && (
                   <div className="space-y-4">
                      {round.courts.map((pair, idx) => (
                        <div key={idx} className="p-5 bg-slate-900 rounded-2xl border border-slate-700">
                           <p className="text-[10px] text-indigo-400 font-bold mb-3">COURT {courtNumbers[idx]}</p>
                           <div className="flex justify-between items-center mb-4">
                              <TeamChip teamId={pair[0]} />
                              <span className="text-slate-600 text-xs">VS</span>
                              <TeamChip teamId={pair[1]} />
                           </div>
                           {isAdmin && !pending[`court_${idx}`] && (
                             <div className="flex gap-2">
                                <button onClick={() => handleResult(idx, {winnerId: pair[0], loserId: pair[1], winnerScore: 11, loserScore: 0})} className="flex-1 bg-slate-800 py-1 text-xs rounded-lg">Win {teamById(pair[0]).name}</button>
                                <button onClick={() => handleResult(idx, {winnerId: pair[1], loserId: pair[0], winnerScore: 11, loserScore: 0})} className="flex-1 bg-slate-800 py-1 text-xs rounded-lg">Win {teamById(pair[1]).name}</button>
                             </div>
                           )}
                           {pending[`court_${idx}`] && <p className="text-center text-green-400 text-sm font-bold">✓ Score Logged</p>}
                        </div>
                      ))}
                   </div>
                 )}
                 {/* Map Standings and History similar to your existing code here */}
               </>
             )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
