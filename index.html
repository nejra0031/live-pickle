    // ─── Firebase normalisation ────────────────────────────────────────────────
    function toArr(val) {
      if (!val) return [];
      if (Array.isArray(val)) return val;
      if (typeof val === 'string' || typeof val === 'number') return [val];
      return Object.keys(val).sort((a,b)=>Number(a)-Number(b)).map(k=>val[k]);
    }
    function normaliseSnapshot(s) {
      if (!s) return s;
      const rawReg = s.teamRegistry ? toArr(s.teamRegistry) : null;
      const registry = rawReg
        ? rawReg.filter(t=>t&&t.id&&t.name&&t.color).map(t=>({id:String(t.id),name:String(t.name),color:String(t.color),text:String(t.text||"#fff")}))
        : null;
      if (registry && registry.length > 0) registerTeams(registry);
      const h = toArr(s.history).map(r=>({...r,games:toArr(r.games),bye:toArr(r.bye),paused:toArr(r.paused)}));
      const rd = s.roundData ? {
        courtTeamIds: toArr(s.roundData.courtTeamIds).map(p=>toArr(p)),
        byeIds: toArr(s.roundData.byeIds),
        pausedTeamIds: toArr(s.roundData.pausedTeamIds),
      } : null;
      return { ...s, history:h, roundData:rd,
        activeTeamIds:toArr(s.activeTeamIds), courtNumbers:toArr(s.courtNumbers),
        pausedIds:toArr(s.pausedIds), teamRegistry:registry };
    }

    // ─── Standings helpers ─────────────────────────────────────────────────────
    function mkStandings(ids) {
      return ids.map(id=>({...teamById(id),id,wins:0,losses:0,scoreDiff:0,played:0}));
    }
    function rerank(st) {
      return [...st].sort((a,b)=>{
        if(b.wins!==a.wins)return b.wins-a.wins;
        if(b.scoreDiff!==a.scoreDiff)return b.scoreDiff-a.scoreDiff;
        return a.played-b.played;
      });
    }
    function rebuildStandings(ids, history) {
      const map=Object.fromEntries(mkStandings(ids).map(t=>[t.id,{...t}]));
      history.forEach(rd=>{
        rd.games.forEach(g=>{
          const w=map[g.winnerId],l=map[g.loserId]; if(!w||!l)return;
          w.wins++;w.scoreDiff+=g.winnerScore-g.loserScore;w.played++;
          l.losses++;l.scoreDiff+=g.loserScore-g.winnerScore;l.played++;
        });
      });
      return Object.values(map);
    }

    const ORDINAL=n=>{const s=["th","st","nd","rd"],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);};

    // ─── Audio ─────────────────────────────────────────────────────────────────
    let _audioCtx=null;
    function getAudioCtx(){ if(!_audioCtx||_audioCtx.state==="closed") _audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return _audioCtx; }
    function playWarningBeep(){
      try{
        const ctx=getAudioCtx();
        const fire=()=>{
          for(let i=0;i<2;i++){
            const osc=ctx.createOscillator(),gain=ctx.createGain();
            osc.connect(gain);gain.connect(ctx.destination);
            osc.type="sine";osc.frequency.value=880;
            const t=ctx.currentTime+i*0.28;
            gain.gain.setValueAtTime(0,t);gain.gain.linearRampToValueAtTime(0.6,t+0.01);
            gain.gain.exponentialRampToValueAtTime(0.001,t+0.2);osc.start(t);osc.stop(t+0.22);
          }
        };
        ctx.state==="suspended"?ctx.resume().then(fire):fire();
      }catch(e){}
    }
    function playAlarm(){
      try{
        const ctx=getAudioCtx();
        const fire=()=>{
          const blasts=[{freq:1200,dur:0.55,gap:0.15},{freq:900,dur:0.55,gap:0.15},{freq:600,dur:0.9,gap:0}];
          let t=ctx.currentTime+0.05;
          blasts.forEach(({freq,dur,gap})=>{
            const osc=ctx.createOscillator(),gain=ctx.createGain(),osc2=ctx.createOscillator();
            osc.connect(gain);osc2.connect(gain);gain.connect(ctx.destination);
            osc.type="sawtooth";osc.frequency.value=freq;osc2.type="square";osc2.frequency.value=freq*1.5;
            gain.gain.setValueAtTime(0,t);gain.gain.linearRampToValueAtTime(1.0,t+0.02);
            gain.gain.setValueAtTime(1.0,t+dur-0.08);gain.gain.exponentialRampToValueAtTime(0.001,t+dur);
            osc.start(t);osc.stop(t+dur);osc2.start(t);osc2.stop(t+dur);t+=dur+gap;
          });
        };
        ctx.state==="suspended"?ctx.resume().then(fire):fire();
      }catch(e){}
    }

            <circle cx={17} cy={17} r={13} fill="none" stroke={color} strokeWidth={3}

              style={{transition:"stroke-dashoffset 1s linear,stroke 0.3s"}}/>

          </div>
        </div>
      );

            <svg viewBox={`0 0 ${SZ} ${SZ}`} width="100%" height="100%" style={{display:"block"}}>
              <circle cx={cx} cy={cy} r={R} fill="none" stroke="rgba(0,0,0,0.07)" strokeWidth={SW}/>
              <circle cx={cx} cy={cy} r={R} fill="none" stroke={color} strokeWidth={SW}
                strokeDasharray={circ} strokeDashoffset={-circ*(1-pct)} strokeLinecap="round"
                transform={`rotate(-90 ${cx} ${cy})`}
                style={{transition:"stroke-dashoffset 1s linear,stroke 0.4s"}}/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",padding:`${SW+8}px`}}>
              <div style={{fontFamily:"'Courier New',monospace",
                fontSize:expired?"clamp(18px,6vw,38px)":"clamp(32px,10vw,72px)",
                fontWeight:900,color,lineHeight:1,letterSpacing:expired?1:3,
                transition:"color 0.4s",textAlign:"center"}}>
                {expired?"TIME'S UP":`${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── Main App ──────────────────────────────────────────────────────────────
    function App(){
      const[phase,setPhase]=useState("loading");
      const[tournamentTitle,setTournamentTitle]=useState("Live Scores");
      const[activeTeamIds,setActiveTeamIds]=useState([]);
      const[courtNumbers,setCourtNumbers]=useState([]);
      const[history,setHistory]=useState([]);
      const[standings,setStandings]=useState([]);
      const[round,setRound]=useState(null);
      const[roundNum,setRoundNum]=useState(1);
      const[roundComplete,setRoundComplete]=useState(false);
      const[activeTab,setActiveTab]=useState("play");
      const[pausedIds,setPausedIds]=useState([]);
      const[timerSecsLeft,setTimerSecsLeft]=useState(0);
      const[timerDuration,setTimerDuration]=useState(0);
      const[presence,setPresence]=useState({viewers:0,admins:0});

      const timerRunningRef=useRef(false),timerStartedRef=useRef(null),timerPausedRef=useRef(0);
      const timerTickRef=useRef(null);
      const timerDurationRef=useRef(0);
      const alarmFiredRef=useRef(false);
      const warningsFiredRef=useRef(new Set());
      const lastSeenRoundNumRef=useRef(-1);

      const computeSecsLeft=()=>{
        if(!timerRunningRef.current||!timerStartedRef.current)return timerPausedRef.current;
        return Math.max(0,timerPausedRef.current-Math.floor((Date.now()-timerStartedRef.current)/1000));
      };
      const applyTimer=(running,startedAt,pausedSecs)=>{
        timerRunningRef.current=running;timerStartedRef.current=startedAt;timerPausedRef.current=pausedSecs;
        const s=running&&startedAt?Math.max(0,pausedSecs-Math.floor((Date.now()-startedAt)/1000)):pausedSecs;
        setTimerSecsLeft(s);
        clearInterval(timerTickRef.current);
        if(running&&startedAt){
          timerTickRef.current=setInterval(()=>{
            const secs=computeSecsLeft();setTimerSecsLeft(secs);
            [180,60].forEach(thresh=>{
              if(secs<=thresh&&!warningsFiredRef.current.has(thresh)&&timerDurationRef.current>thresh){
                warningsFiredRef.current.add(thresh);playWarningBeep();
              }
            });
            if(secs<=0){
              clearInterval(timerTickRef.current);
              if(!alarmFiredRef.current&&timerDurationRef.current>0){alarmFiredRef.current=true;playAlarm();timerRunningRef.current=false;}
            }
          },500);
        }
      };

      useEffect(()=>{
        const ref=db.ref('current_tournament');
        const loaded={v:false};
        ref.on('value',snap=>{
          const data=snap.val();
          loaded.v=true;
          if(!data||data.phase!=="play"){setPhase("waiting");return;}
          const s=normaliseSnapshot(data);
          if(s.tournamentTitle){setTournamentTitle(s.tournamentTitle);document.title=s.tournamentTitle;}
          const ns=rebuildStandings(s.activeTeamIds,s.history);
          let nr=null;
          if(s.roundData&&s.roundData.courtTeamIds){
            const safe=id=>teamById(id)||{id,name:String(id),color:"#475569",text:"#fff"};
            nr={courts:s.roundData.courtTeamIds.map(p=>p.map(safe)),bye:(s.roundData.byeIds||[]).map(safe),paused:(s.roundData.pausedTeamIds||[]).map(safe)};
          }
          setActiveTeamIds(s.activeTeamIds);setCourtNumbers(s.courtNumbers);
          setHistory(s.history);setStandings(ns);setRound(nr);setRoundNum(s.roundNum);
          setPausedIds(s.pausedIds||[]);setRoundComplete(s.roundComplete||false);
          const dur=s.timerDuration||0;
          setTimerDuration(dur);timerDurationRef.current=dur;
          // Only reset alarm/warning state when the round number actually changes
          if(s.roundNum!==lastSeenRoundNumRef.current){
            lastSeenRoundNumRef.current=s.roundNum;
            alarmFiredRef.current=false;warningsFiredRef.current=new Set();
          }
          // Pre-populate thresholds already passed so beeps don't misfire on page load
          const _tRun=s.timerRunning||false,_tSA=s.timerStartedAt||null,_tPS=s.timerPausedSecsLeft??dur;
          const _curSecs=_tRun&&_tSA?Math.max(0,_tPS-Math.floor((Date.now()-_tSA)/1000)):_tPS;
          [180,60].forEach(thresh=>{if(dur>thresh&&_curSecs<thresh)warningsFiredRef.current.add(thresh);});
          applyTimer(_tRun,_tSA,_tPS);
          setPhase("play");
        });
        const t=setTimeout(()=>{if(!loaded.v)setPhase("waiting");},4000);
        return()=>{ref.off();clearTimeout(t);clearInterval(timerTickRef.current);};
      },[]);

      useEffect(()=>{document.title=tournamentTitle;},[tournamentTitle]);

      useEffect(()=>{
        const ref=db.ref('presence').push();
        ref.set({role:'viewer',joinedAt:Date.now()});
        ref.onDisconnect().remove();
        const h=snap=>{const d=snap.val()||{},e=Object.values(d);setPresence({viewers:e.filter(x=>x&&x.role==='viewer').length,admins:e.filter(x=>x&&x.role==='admin').length});};
        db.ref('presence').on('value',h);
        return()=>{ref.remove();db.ref('presence').off('value',h);};
      },[]);

      const ranked=rerank(standings);

      return(
        <div style={{minHeight:"100vh",background:"#fff",fontFamily:"'Trebuchet MS',sans-serif",color:"#1e293b"}} onClick={()=>{try{getAudioCtx();}catch(e){}}}>
          {/* Fixed header */}
          <div style={{position:"fixed",top:0,left:0,right:0,zIndex:40,background:"#fff",
            borderBottom:"1px solid rgba(0,0,0,0.08)",boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
            <div style={{maxWidth:720,margin:"0 auto",padding:"0 clamp(12px,3vw,20px)"}}>
              <div style={{display:"flex",alignItems:"center",gap:"clamp(8px,2vw,14px)",padding:"clamp(8px,2vw,14px) 0"}}>
                <img src={BALL_ICO} alt="" style={{width:"clamp(36px,7vw,52px)",height:"clamp(36px,7vw,52px)",borderRadius:"50%",objectFit:"cover",flexShrink:0}}/>
                <div style={{flex:1,minWidth:0}}>
                  <h1 style={{fontWeight:900,fontSize:"clamp(16px,4vw,26px)",color:"#0f4c75",margin:0,
                    whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",lineHeight:1.1}}>
                    {tournamentTitle}
                  </h1>
                  {phase==="play"&&<p style={{margin:0,fontSize:"clamp(10px,2.5vw,13px)",color:"#64748b"}}>
                    {activeTeamIds.length} teams · 🔵 Viewer
                    {(presence.admins>0||presence.viewers>1)&&(
                      <span style={{marginLeft:8,color:"#94a3b8",fontSize:"clamp(9px,2vw,11px)"}}>
                        {presence.admins>0&&`🟢${presence.admins} `}{presence.viewers>1&&`🔵${presence.viewers}`}
                      </span>
                    )}
                  </p>}
                </div>
              </div>
              {phase==="play"&&(
                <div style={{display:"flex",gap:"clamp(6px,1.5vw,10px)",paddingBottom:"clamp(6px,1.5vw,10px)"}}>
                  {[["play","🎾 Play"],["standings","🏆 Standings"],["history","📋 History"]].map(([id,label])=>(
                    <button key={id} onClick={()=>setActiveTab(id)}
                      style={{flex:1,borderRadius:12,fontWeight:700,cursor:"pointer",
                        padding:"clamp(6px,1.5vw,10px) 4px",fontSize:"clamp(11px,2.5vw,14px)",
                        background:activeTab===id?"linear-gradient(90deg,#0f4c75,#1a6fa8)":"rgba(0,0,0,0.05)",
                        color:activeTab===id?"#fff":"#475569",
                        border:activeTab===id?"none":"1px solid rgba(0,0,0,0.08)"}}>
                      {label}
                    </button>
                  ))}
                </div>
              )}
            </div>
          </div>

          {/* Scrollable content */}
          <div style={{maxWidth:720,margin:"0 auto",
            padding:`${phase==="play"?"clamp(130px,18vw,160px)":"clamp(90px,12vw,110px)"} clamp(12px,3vw,20px) clamp(16px,3vw,24px)`}}>

            {phase==="loading"&&(
              <div style={{textAlign:"center",padding:"60px 20px",color:"#94a3b8"}}>
                <div style={{fontSize:32,marginBottom:12}}>🔄</div>
                <p style={{margin:0}}>Connecting…</p>
              </div>
            )}

            {phase==="waiting"&&(
              <div style={{textAlign:"center",padding:"60px 20px"}}>
                <div style={{fontSize:40,marginBottom:12}}>🏓</div>
                <p style={{fontWeight:700,color:"#0f4c75",fontSize:"clamp(16px,4vw,22px)",margin:"0 0 8px"}}>No active tournament</p>
                <p style={{color:"#94a3b8",fontSize:"clamp(12px,3vw,15px)",margin:0}}>Waiting for the organizer to start a game.</p>
              </div>
            )}

            {phase==="play"&&(
              <>
                {/* Compact timer on non-play tabs */}
                {timerDuration>0&&activeTab!=="play"&&(
                  <TimerBar secsLeft={timerSecsLeft} totalSecs={timerDuration} roundNum={roundNum}/>
                )}

                {/* ── Play tab — no active round ── */}
                {activeTab==="play"&&!round&&(
                  <div style={{padding:"clamp(24px,6vw,48px) clamp(12px,3vw,20px)",borderRadius:16,textAlign:"center",
                    background:"rgba(0,0,0,0.03)",border:"1px solid rgba(0,0,0,0.08)"}}>
                    <div style={{fontSize:"clamp(32px,8vw,52px)",marginBottom:"clamp(8px,2vw,14px)"}}>
                      {roundNum===0?"🏓":"⏳"}
                    </div>
                    <p style={{fontWeight:700,color:"#0f4c75",fontSize:"clamp(15px,4vw,22px)",margin:"0 0 8px"}}>
                      {roundNum===0?"Waiting for Round 1…":"Waiting for next round…"}
                    </p>
                    <p style={{color:"#94a3b8",fontSize:"clamp(12px,3vw,15px)",margin:0}}>
                      {roundNum===0?"The organizer will start the tournament shortly.":"The organizer is setting up the next round."}
                    </p>
                  </div>
                )}

                {/* ── Play tab — active round ── */}
                {activeTab==="play"&&round&&(
                  <div style={{display:"flex",flexDirection:"column",gap:"clamp(10px,2.5vw,16px)"}}>
                    {timerDuration>0&&(
                      <TimerRing secsLeft={timerSecsLeft} totalSecs={timerDuration} roundNum={roundNum}/>
                    )}
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                      <span style={{fontWeight:700,color:"#0f4c75",fontSize:"clamp(13px,3vw,17px)"}}>Round {roundNum}</span>
                      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        {round.paused&&round.paused.length>0&&(
                          <div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
                            <span style={{color:"#94a3b8",fontSize:"clamp(10px,2.5vw,12px)",fontWeight:700}}>Paused:</span>
                            {round.paused.map(t=>{const tm=teamById(t.id);if(!tm)return null;return(
                              <span key={t.id} style={{display:"inline-flex",alignItems:"center",borderRadius:999,fontWeight:700,
                                background:tm.color,color:tm.text,border:"2px solid rgba(255,255,255,0.2)",
                                fontSize:"clamp(11px,3vw,15px)",padding:"clamp(3px,0.8vw,6px) clamp(8px,2vw,14px)"}}>
                                {tm.name}
                              </span>
                            );})}
                          </div>
                        )}
                        {round.bye&&round.bye.length>0&&(
                          <div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
                            <span style={{color:"#94a3b8",fontSize:"clamp(10px,2.5vw,12px)",fontWeight:700}}>Bye:</span>
                            {round.bye.map(t=>{const tm=teamById(t.id);if(!tm)return null;return(
                              <span key={t.id} style={{display:"inline-flex",alignItems:"center",borderRadius:999,fontWeight:700,
                                background:tm.color,color:tm.text,border:"2px solid rgba(255,255,255,0.2)",
                                fontSize:"clamp(11px,3vw,15px)",padding:"clamp(3px,0.8vw,6px) clamp(8px,2vw,14px)"}}>
                                {tm.name}
                              </span>
                            );})}
                          </div>
                        )}
                      </div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:"clamp(10px,2.5vw,16px)"}}>
                      {round.courts.map((teams,idx)=>(
                        <div key={idx} style={{padding:"clamp(12px,3vw,20px)",borderRadius:16,background:"#fff",
                          border:"1px solid rgba(0,0,0,0.1)",boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
                          <p style={{margin:"0 0 clamp(8px,2vw,14px)",fontWeight:800,fontSize:"clamp(10px,2.5vw,13px)",
                            color:"#0f4c75",textTransform:"uppercase",letterSpacing:"0.1em"}}>
                            Court {courtNumbers[idx]??idx+1}
                          </p>
                          <div style={{display:"flex",alignItems:"stretch",gap:"clamp(8px,2vw,14px)"}}>
                            <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:12,
                              padding:"clamp(14px,3.5vw,24px) clamp(10px,2.5vw,16px)",
                              background:teams[0].color,border:`2px solid ${teams[0].color}`}}>
                              <span style={{fontWeight:900,textAlign:"center",lineHeight:1.1,color:teams[0].text,fontSize:"clamp(18px,5vw,36px)"}}>{teams[0].name}</span>
                            </div>
                            <div style={{display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                              <span style={{fontWeight:900,color:"#cbd5e1",fontSize:"clamp(14px,3.5vw,22px)"}}>VS</span>
                            </div>
                            <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:12,
                              padding:"clamp(14px,3.5vw,24px) clamp(10px,2.5vw,16px)",
                              background:teams[1].color,border:`2px solid ${teams[1].color}`}}>
                              <span style={{fontWeight:900,textAlign:"center",lineHeight:1.1,color:teams[1].text,fontSize:"clamp(18px,5vw,36px)"}}>{teams[1].name}</span>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* ── Standings tab ── */}
                {activeTab==="standings"&&(
                  <div style={{borderRadius:16,overflow:"hidden",border:"1px solid rgba(0,0,0,0.1)",boxShadow:"0 2px 16px rgba(0,0,0,0.06)"}}>
                    <div style={{display:"flex",alignItems:"center",gap:"clamp(6px,1.5vw,12px)",
                      padding:"clamp(8px,2vw,14px) clamp(10px,2.5vw,18px)",
                      background:"#0f4c75",color:"#fff",fontWeight:700,
                      textTransform:"uppercase",letterSpacing:"0.06em",fontSize:"clamp(9px,2vw,12px)"}}>
                      <span style={{width:"clamp(28px,6vw,50px)"}}>Rank</span>
                      <span style={{flex:1}}>Team</span>
                      <span style={{width:"clamp(26px,5.5vw,42px)",textAlign:"center"}}>GP</span>
                      <span style={{width:"clamp(26px,5.5vw,42px)",textAlign:"center",color:"#86efac"}}>W</span>
                      <span style={{width:"clamp(26px,5.5vw,42px)",textAlign:"center",color:"#fca5a5"}}>L</span>
                      <span style={{width:"clamp(30px,6.5vw,50px)",textAlign:"center",color:"#7dd3fc"}}>+/−</span>
                    </div>
                    {ranked.map((team,i)=>{const diff=team.scoreDiff,paused=pausedIds.includes(team.id);return(
                      <div key={team.id} style={{display:"flex",alignItems:"center",gap:"clamp(6px,1.5vw,12px)",
                        padding:"clamp(10px,2.5vw,18px) clamp(10px,2.5vw,18px)",
                        background:i%2===0?"#fff":"#f8fafc",borderTop:"1px solid rgba(0,0,0,0.05)",opacity:paused?0.45:1}}>
                        <span style={{width:"clamp(28px,6vw,50px)",fontWeight:900,color:"#64748b",fontSize:"clamp(14px,3.5vw,22px)"}}>
                          {i===0?"🥇":i===1?"🥈":i===2?"🥉":ORDINAL(i+1)}
                        </span>
                        <div style={{flex:1,minWidth:0}}>
                          <span style={{display:"inline-flex",alignItems:"center",borderRadius:999,fontWeight:900,
                            background:team.color,color:team.text,
                            fontSize:"clamp(13px,3.5vw,20px)",
                            padding:"clamp(4px,1vw,8px) clamp(10px,2.5vw,18px)",
                            border:"2px solid rgba(255,255,255,0.25)",
                            boxShadow:`0 2px 8px ${team.color}44`}}>
                            {team.name}{paused?" ⏸":""}
                          </span>
                        </div>
                        <span style={{width:"clamp(26px,5.5vw,42px)",textAlign:"center",color:"#475569",fontSize:"clamp(14px,3.5vw,22px)",fontWeight:700}}>{team.played}</span>
                        <span style={{width:"clamp(26px,5.5vw,42px)",textAlign:"center",color:"#16a34a",fontWeight:900,fontSize:"clamp(16px,4vw,24px)"}}>{team.wins}</span>
                        <span style={{width:"clamp(26px,5.5vw,42px)",textAlign:"center",color:"#dc2626",fontWeight:900,fontSize:"clamp(16px,4vw,24px)"}}>{team.losses}</span>
                        <span style={{width:"clamp(30px,6.5vw,50px)",textAlign:"center",fontWeight:900,fontSize:"clamp(14px,3.5vw,22px)",
                          color:diff>0?"#16a34a":diff<0?"#dc2626":"#94a3b8"}}>{diff>0?"+":""}{diff}</span>
                      </div>
                    );})}
                  </div>
                )}

                {/* ── History tab ── */}
                {activeTab==="history"&&(
                  <div style={{display:"flex",flexDirection:"column",gap:"clamp(8px,2vw,14px)"}}>
                    {history.length===0&&(
                      <div style={{textAlign:"center",padding:"60px 20px",color:"#94a3b8",fontSize:"clamp(12px,3vw,15px)"}}>No rounds completed yet.</div>
                    )}
                    {[...history].reverse().map((h,revI)=>{
                      const ri=history.length-1-revI;
                      const sbf=rebuildStandings(activeTeamIds,history.slice(0,ri));
                      const saf=rebuildStandings(activeTeamIds,history.slice(0,ri+1));
                      const rbf=rerank(sbf),raf=rerank(saf);
                      const rb=id=>rbf.findIndex(t=>t.id===id)+1;
                      const ra=id=>raf.findIndex(t=>t.id===id)+1;
                      const played=h.games.flatMap(g=>[g.winnerId,g.loserId]);
                      const hasBye=h.bye&&h.bye.length>0;
                      return(
                        <div key={ri} style={{borderRadius:16,background:"#fff",border:"1px solid rgba(0,0,0,0.08)",overflow:"hidden"}}>
                          <div style={{padding:"clamp(8px,2vw,12px) clamp(12px,3vw,18px)",background:"rgba(15,76,117,0.06)",borderBottom:"1px solid rgba(0,0,0,0.07)"}}>
                            <span style={{fontSize:"clamp(10px,2.5vw,13px)",color:"#0f4c75",fontWeight:800,textTransform:"uppercase",letterSpacing:"0.08em"}}>Round {h.roundNum}</span>
                          </div>
                          <div style={{padding:"clamp(8px,2vw,12px) clamp(12px,3vw,18px)"}}>
                            {h.games.map((game,gi)=>{const w=teamById(game.winnerId),l=teamById(game.loserId);return(
                              <div key={gi} style={{display:"grid",gridTemplateColumns:"clamp(22px,5vw,36px) 1fr clamp(22px,5vw,34px) clamp(10px,2vw,14px) clamp(22px,5vw,34px) 1fr",
                                alignItems:"center",gap:"clamp(4px,1vw,8px)",marginBottom:gi<h.games.length-1?"clamp(6px,1.5vw,10px)":0}}>
                                <span style={{color:"#94a3b8",fontSize:"clamp(10px,2.5vw,13px)",fontWeight:700,textAlign:"center"}}>{game.courtNumber}</span>
                                <div style={{display:"flex",justifyContent:"flex-end"}}>
                                  <span style={{display:"inline-flex",alignItems:"center",borderRadius:999,fontWeight:700,whiteSpace:"nowrap",
                                    background:w?.color,color:w?.text,fontSize:"clamp(11px,3vw,15px)",padding:"clamp(3px,0.8vw,6px) clamp(8px,2vw,14px)"}}>{w?.name}</span>
                                </div>
                                <span style={{fontWeight:800,textAlign:"right",color:w?.color,fontSize:"clamp(13px,3vw,17px)"}}>{game.winnerScore}</span>
                                <span style={{color:"#cbd5e1",fontSize:"clamp(10px,2.5vw,13px)",textAlign:"center"}}>–</span>
                                <span style={{fontWeight:800,textAlign:"left",color:l?.color,fontSize:"clamp(13px,3vw,17px)"}}>{game.loserScore}</span>
                                <div style={{display:"flex",justifyContent:"flex-start"}}>
                                  <span style={{display:"inline-flex",alignItems:"center",borderRadius:999,fontWeight:700,whiteSpace:"nowrap",
                                    background:l?.color,color:l?.text,fontSize:"clamp(11px,3vw,15px)",padding:"clamp(3px,0.8vw,6px) clamp(8px,2vw,14px)"}}>{l?.name}</span>
                                </div>
                              </div>
                            );})}
                          </div>
                          {h.paused&&h.paused.length>0&&(
                            <div style={{borderTop:"1px solid rgba(0,0,0,0.07)",padding:"clamp(6px,1.5vw,10px) clamp(12px,3vw,18px)"}}>
                              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                                <span style={{color:"#94a3b8",fontSize:"clamp(10px,2.5vw,12px)",fontWeight:700}}>Paused</span>
                                {h.paused.map(id=>{const t=teamById(id);if(!t)return null;return(
                                  <span key={id} style={{display:"inline-flex",alignItems:"center",borderRadius:999,fontWeight:700,
                                    background:"rgba(0,0,0,0.05)",color:"#64748b",fontSize:"clamp(11px,3vw,15px)",
                                    padding:"clamp(3px,0.8vw,6px) clamp(8px,2vw,14px)",
                                    border:"1px solid rgba(0,0,0,0.1)",textDecoration:"line-through"}}>{t.name}</span>
                                );})}
                              </div>
                            </div>
                          )}
                          {hasBye&&(
                            <div style={{borderTop:"1px solid rgba(0,0,0,0.07)",padding:"clamp(6px,1.5vw,10px) clamp(12px,3vw,18px)"}}>
                              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                                <span style={{color:"#94a3b8",fontSize:"clamp(10px,2.5vw,12px)",fontWeight:700}}>Bye</span>
                                {h.bye.map(id=>{const t=teamById(id);if(!t)return null;return(
                                  <span key={id} style={{display:"inline-flex",alignItems:"center",borderRadius:999,fontWeight:700,
                                    background:t.color,color:t.text,fontSize:"clamp(11px,3vw,15px)",padding:"clamp(3px,0.8vw,6px) clamp(8px,2vw,14px)"}}>{t.name}</span>
                                );})}
                              </div>
                            </div>
                          )}
                          <div style={{borderTop:"1px solid rgba(0,0,0,0.07)",padding:"clamp(6px,1.5vw,10px) clamp(12px,3vw,18px)"}}>
                            <p style={{fontSize:"clamp(9px,2vw,11px)",color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",margin:"0 0 4px"}}>Rankings</p>
                            <div style={{display:"flex",flexWrap:"wrap",gap:"clamp(8px,2vw,16px) clamp(12px,3vw,20px)"}}>
                              {played.map(id=>{const b=rb(id),a=ra(id),d=b-a,t=teamById(id);if(!t)return null;return(
                                <div key={id} style={{display:"flex",alignItems:"center",gap:4,fontSize:"clamp(11px,2.5vw,14px)"}}>
                                  <span style={{color:t.color,fontWeight:700}}>{t.name}</span>
                                  <span style={{color:"#94a3b8"}}>#{b}→</span>
                                  <span style={{fontWeight:700,color:d>0?"#16a34a":d<0?"#dc2626":"#94a3b8"}}>#{a}</span>
                                  {d>0&&<span style={{color:"#16a34a",fontSize:"clamp(9px,2vw,11px)"}}>▲{d}</span>}
                                  {d<0&&<span style={{color:"#dc2626",fontSize:"clamp(9px,2vw,11px)"}}>▼{Math.abs(d)}</span>}
                                </div>
                              );})}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </>
            )}
          </div>
        </div>
      );
    }

    const root=ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
